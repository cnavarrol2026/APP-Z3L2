        document.getElementById('view-' + button.dataset.view).classList.add('active');

    });
  }

  function bindConfigTabs() {

  function openConfigPage(pageName, options) {
    const configOptions = options || {};
    const button = document.querySelector('.config-tab[data-config-page="' + pageName + '"]');
    const page = document.getElementById('config-page-' + pageName);
    if (!button || !page) return;
    if (pageName === 'producto' && !configOptions.preserveDraft) {
      const draftForm = document.getElementById('draftForm');
      const hiddenId = draftForm && draftForm.elements.id ? draftForm.elements.id.value : '';
      if (state.editingDraftId || hiddenId) {
        resetDraftForm(draftForm);
      }
    }
    document.querySelectorAll('.config-tab').forEach((item) => item.classList.remove('active'));
    document.querySelectorAll('.config-page').forEach((item) => item.classList.remove('active'));
    button.classList.add('active');
    page.classList.add('active');
  }

  function callServer(functionName, payload) {
    return new Promise((resolve, reject) => {
      const timeout = window.setTimeout(() => {
        reject(new Error('Apps Script está tardando más de lo esperado. Recarga la página e intenta nuevamente.'));
      }, 45000);
      google.script.run
        .withSuccessHandler((response) => {
          window.clearTimeout(timeout);
          if (response && response.ok) {
            resolve(response.data);
            return;
          }
          reject(new Error(getErrorMessage(response, 'La función ' + functionName + ' no devolvió una respuesta válida.')));
        })
        .withFailureHandler((error) => {
          window.clearTimeout(timeout);
          reject(new Error(getErrorMessage(error, 'No fue posible ejecutar ' + functionName + '.')));
        })
        [functionName](payload);
    });
  }

  function getErrorMessage(error, fallback) {
    if (!error) return fallback || 'Ocurrió un error sin detalle.';
    if (typeof error === 'string') return error;
    if (error.message) return error.message;
    if (error.errorMessage) return error.errorMessage;
    try {
      return JSON.stringify(error);
    } catch (ignored) {
      return fallback || 'Ocurrió un error sin detalle.';
    }
  }

  function loadInitialData() {
    const slowLoadTimer = window.setTimeout(() => {
      setConnectionStatus('Verificando base de datos');
      setGlobalStatus('La base de datos está tardando más de lo esperado. La interfaz permanece disponible.', 'warning');
      renderLoadWarnings(['La base de datos está tardando más de lo esperado. La interfaz permanece disponible.']);
    }, 8000);
    callServer('apiPing')
      .then((ping) => {
        if (ping && ping.user) setUserInfo(ping.user);
        return callServer('apiGetInitialData');
      })
      .then((data) => {
        window.clearTimeout(slowLoadTimer);
        state.user = data.user;
        state.lookup = data.lookup;
        state.admin = data.admin;
        state.drafts = data.drafts;
        state.discarded = data.discarded;
        state.history = data.history;
        setConnectionStatus('Aplicación disponible');
        setUserInfo(data.user);
        setGlobalStatus('Base técnica cargada. Verificando datos guardados...', 'info');
        renderLoadWarnings(data.warnings || []);
        renderAll();
        syncSavedData();
      })
      .catch((error) => {
        const message = getErrorMessage(error, 'No fue posible conectar con la base de datos.');
        window.clearTimeout(slowLoadTimer);
        setConnectionStatus('Aplicación disponible');
        setGlobalStatus('No fue posible verificar Apps Script. Detalle: ' + message, 'error');
        renderLoadWarnings(['No fue posible verificar Apps Script: ' + message]);
        showToast(message);
      });
  }

  function syncSavedData() {
    callServer('apiCheckSheets')
      .then((sheetCheck) => {
        if (sheetCheck && sheetCheck.user) setUserInfo(sheetCheck.user);
        return callServer('apiGetSavedData');
      })
      .then((data) => {
        state.user = data.user || state.user;
        state.lookup = data.lookup || state.lookup;
        state.admin = data.admin || state.admin;
        state.drafts = data.drafts || [];
        state.discarded = data.discarded || [];
        state.history = data.history || [];
        setConnectionStatus('Base sincronizada');
        setUserInfo(state.user);
        setGlobalStatus('', '');
        renderLoadWarnings(data.warnings || []);
        renderAll();
      })
      .catch((error) => {
        const message = getErrorMessage(error, 'No fue posible leer los datos guardados.');
        setConnectionStatus('Base no conectada');
        setGlobalStatus('No fue posible leer los datos guardados. Detalle: ' + message, 'error');
        renderLoadWarnings(['No fue posible leer los datos guardados: ' + message]);
      });
  }

  function setConnectionStatus(message) {
    const status = document.getElementById('connectionStatus');
    if (status) status.textContent = message;
  }

  function setUserInfo(user) {
    const container = document.getElementById('userEmail');
    if (!container) return;
    if (!user) {
      container.textContent = 'Usuario Google';
      return;
    }
    if (user.identified && user.email) {
      container.textContent = user.email;
      return;
    }
    if (user.effectiveEmail) {
      container.textContent = 'Usuario Google autenticado';
      container.title = 'Apps Script ejecuta con la cuenta propietaria: ' + user.effectiveEmail;
      return;
    }
    container.textContent = user.displayName || 'Usuario Google autenticado';
  }

  function setGlobalStatus(message, tone) {
    const status = document.getElementById('globalLoadStatus');
    if (!status) return;
    status.textContent = message || '';
    status.className = 'load-status ' + (tone || '');
    status.hidden = !message;
  }

  function setOperationStatus(message, tone) {
    setGlobalStatus(message, tone || 'info');
  }

  function setFormBusy(form, isBusy, message) {
    if (form) {
      form.querySelectorAll('button, input, select').forEach((control) => {
        control.disabled = !!isBusy;
      });
    }
    if (isBusy) {
      setOperationStatus(message || 'Procesando solicitud...', 'info');
    } else {
      setOperationStatus('', '');
    }
  }

  function setButtonBusy(button, isBusy, message) {
    if (!button) return;
    if (isBusy) {
      button.dataset.originalText = button.textContent;
      button.textContent = message || 'Procesando...';
      button.disabled = true;
      button.classList.add('is-loading');
      return;
    }
    button.textContent = button.dataset.originalText || button.textContent;
    button.disabled = false;
    button.classList.remove('is-loading');
    delete button.dataset.originalText;
  }

  function renderLoadWarnings(warnings) {
    const message = warnings && warnings.length ? warnings.join(' ') : '';
    document.querySelectorAll('.load-warning').forEach((item) => {
      item.remove();
    });
    if (!message) return;
    document.querySelectorAll('.config-page').forEach((page) => {
      const warning = document.createElement('div');
      warning.className = 'empty-state load-warning';
      warning.textContent = message;
      page.prepend(warning);
    });
  }

      .map((article) => article.botellaId));
    const bottles = (state.lookup.botellas || []).filter((bottle) => bottleIds.includes(bottle.id));
    fillSelect('bottleSelect', bottles, 'Selecciona botella');
    renderArticleSelect();
  }

  function renderArticleSelect() {
    const categoryId = document.getElementById('categorySelect').value;
    const bottleId = document.getElementById('bottleSelect').value;
    const articles = state.lookup.articulos.filter((article) => article.categoriaId === categoryId && article.botellaId === bottleId);
    const select = document.getElementById('articleSelect');
    select.innerHTML = '<option value="">Selecciona artículo</option>';
    articles.forEach((article) => {
      const option = document.createElement('option');
      option.value = article.id;
      option.textContent = article.codigoArticulo + ' - ' + article.descripcion;
      select.appendChild(option);
    });
    renderArticleDetail();
  }

  function renderArticleDetail() {
    const articleId = document.getElementById('articleSelect').value;
    const article = state.lookup.articulos.find((item) => item.id === articleId);
    const detail = document.getElementById('articleDetail');
    const images = document.getElementById('imageSummary');
    document.getElementById('pdfButton').disabled = !article;
    if (!article) {
      detail.className = 'empty-state';
      detail.textContent = 'Selecciona un artículo activo para ver la ficha.';
      images.className = 'empty-state';
      images.textContent = 'Selecciona un artículo activo para ver sus códigos ETQ y CET.';
      return;
    }
    detail.className = '';
    detail.innerHTML = '';
    renderArticleSummary(detail, article);
    renderArticleTechnicalSheet(detail, article);
    renderArticleImages(images, article);
  }

  function renderArticleImages(container, article) {
    container.className = 'article-image-list';
    container.innerHTML = '';
    container.appendChild(createArticleImageCard(article, 'ETQ', 'Etiqueta'));
    container.appendChild(createArticleImageCard(article, 'CET', 'Contraetiqueta'));
  }

  function createArticleImageCard(article, type, label) {
    const applies = type === 'ETQ'
      ? toBooleanClient(article.etqAplica)
      : toBooleanClient(article.cetAplica);
    const code = type === 'ETQ' ? article.codigoEtq : article.codigoCet;
    const image = findArticleImage(article, type);
    const card = document.createElement('article');
    card.className = 'article-image-card' + (!applies || !image ? ' missing' : '');

    const head = document.createElement('div');
    head.className = 'article-image-head';
    const title = document.createElement('strong');
    title.textContent = type;
    const detail = document.createElement('span');
    detail.textContent = applies ? (code || 'Código pendiente') : 'No aplica';
    head.append(title, detail);
    card.appendChild(head);

    if (!applies) {
      const note = document.createElement('p');
      note.textContent = label + ' no requerida para este producto.';
      card.appendChild(note);
      return card;
    }

    if (!image) {
      const note = document.createElement('p');
      note.textContent = 'Imagen ' + type + ' pendiente de carga.';
      card.appendChild(note);
      return card;
    }

    const previewWrap = document.createElement('button');
    previewWrap.className = 'article-image-preview-button';
    previewWrap.type = 'button';
    previewWrap.textContent = 'Cargando imagen...';
    previewWrap.addEventListener('click', () => openImagePreviewModal(article, type, label));
    card.appendChild(previewWrap);

    loadArticleImagePreview(article, type, label)
      .then((preview) => {
        previewWrap.innerHTML = '';
        const previewImage = document.createElement('img');
        previewImage.src = preview.dataUrl;
        previewImage.alt = label + ' ' + (code || type);
        previewImage.loading = 'lazy';
        previewWrap.appendChild(previewImage);
      })
      .catch(() => {
        previewWrap.classList.add('unavailable');
        previewWrap.textContent = 'No fue posible mostrar la vista previa.';
      });

    const button = document.createElement('button');
    button.className = 'article-image-link';
    button.type = 'button';
    button.textContent = 'Ver imagen';
    button.addEventListener('click', () => openImagePreviewModal(article, type, label));
    card.appendChild(button);
    return card;
  }

  function findArticleImage(article, type) {
    const images = Array.isArray(article && article.imagenes) ? article.imagenes : [];
    return images.find((image) => image.tipoImagen === type && toBooleanClient(image.activo));
  }

  function getImageCacheKey(article, type) {
    return article.id + ':' + type;
  }

  function loadArticleImagePreview(article, type) {
    const key = getImageCacheKey(article, type);
    if (state.imagePreviewCache[key]) {
      return Promise.resolve(state.imagePreviewCache[key]);
    }
    return callServer('apiGetArticleImagePreview', {
      articuloId: article.id,
      tipoImagen: type
    }).then((preview) => {
      state.imagePreviewCache[key] = preview;
      return preview;
    });
  }

  function bindImagePreviewModal() {
    document.querySelectorAll('[data-close-image-modal]').forEach((item) => {
      item.addEventListener('click', closeImagePreviewModal);
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeImagePreviewModal();
    });
  }

  function openImagePreviewModal(article, type, label) {
    const modal = document.getElementById('imagePreviewModal');
    const title = document.getElementById('imagePreviewTitle');
    const eyebrow = document.getElementById('imagePreviewEyebrow');
    const body = document.getElementById('imagePreviewBody');
    if (!modal || !body) return;
    const code = type === 'ETQ' ? article.codigoEtq : article.codigoCet;
    eyebrow.textContent = type + ' / ' + (label || 'Imagen');
    title.textContent = (code || 'Imagen guardada');
    body.innerHTML = '<div class="empty-state">Cargando imagen...</div>';
    modal.hidden = false;
    document.body.classList.add('modal-open');
    loadArticleImagePreview(article, type, label)
      .then((preview) => {
        body.innerHTML = '';
        const image = document.createElement('img');
        image.src = preview.dataUrl;
        image.alt = (label || type) + ' ' + (code || '');
        body.appendChild(image);
      })
      .catch((error) => {
        body.innerHTML = '';
        const message = document.createElement('div');
        message.className = 'empty-state';
        message.textContent = getErrorMessage(error, 'No fue posible cargar la imagen.');
        body.appendChild(message);
      });
  }

  function closeImagePreviewModal() {
    const modal = document.getElementById('imagePreviewModal');
    if (!modal || modal.hidden) return;
    modal.hidden = true;
    document.body.classList.remove('modal-open');
  }

  function renderArticleSummary(container, article) {
    const summary = document.createElement('section');
    summary.className = 'article-summary-grid';
    [
      ['Código', article.codigoArticulo],
      ['Descripción', article.descripcion],
      ['Estado', article.estado],
      ['Creado por', article.creadoPor],
      ['Última modificación', article.fechaModificacion]
    ].forEach(([label, value]) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.textContent = label + ': ' + (value || '');
      summary.appendChild(item);
    });
    container.appendChild(summary);
  }

  function renderArticleTechnicalSheet(container, article) {
    const sections = (state.admin.secciones || []).slice().sort((a, b) => Number(a.orden || 0) - Number(b.orden || 0));
    const fields = state.admin.campos || [];
    const units = state.admin.unidades || [];
    const values = Array.isArray(article.valores) ? article.valores : [];
    if (!sections.length || !fields.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No hay estructura técnica cargada para mostrar la ficha.';
      container.appendChild(empty);
      return;
    }
    const sheet = document.createElement('section');
    sheet.className = 'article-technical-sheet';
    sections.forEach((section) => {
      const sectionFields = fields
        .filter((field) => field.seccionId === section.id)
        .sort((a, b) => Number(a.orden || 0) - Number(b.orden || 0));
      if (!sectionFields.length) return;
      if (isCapsuladoraSection(section) && !articleCapsuladoraApplies(article, values)) {
        renderArticleCapsuladoraBypass(sheet, section, sectionFields, values);
        return;
      }
      const block = document.createElement('section');
      block.className = section.id === MECHANICAL_SECTION_ID ? 'draft-section mechanical-entry-section' : 'draft-section';
      const title = document.createElement('h4');
      title.textContent = section.nombre;
      block.appendChild(title);
      if (section.id === MECHANICAL_SECTION_ID) {
        renderArticleMechanicalFields(block, sectionFields, units, values);
      } else if (section.id === 'sec_botella_insumos') {
        renderArticleBottleFields(block, sectionFields, units, values);
      } else if (isFormatosSection(section)) {
        renderArticleFormatosFields(block, sectionFields, units, values);
      } else {
        renderArticleSimpleFields(block, sectionFields.filter((field) => !isCapsuladoraBypassField(field)), units, values);
      }
      sheet.appendChild(block);
    });
    container.appendChild(sheet);
  }

  function renderArticleBottleFields(block, fields, units, values) {
    const grid = document.createElement('div');
    grid.className = 'field-grid bottle-insumos-grid';
    fields.forEach((field) => {
      if (isGroupedBottleField(field)) return;
      grid.appendChild(createArticleValueCard(field, units, values));
    });
    renderArticleBottleGroups(grid, fields, units, values);
    block.appendChild(grid);
  }

  function renderArticleBottleGroups(container, fields, units, values) {
    BOTTLE_FIELD_GROUPS.forEach((group) => {
      const groupBlock = document.createElement('div');
      groupBlock.className = 'bottle-mini-card';
      const title = document.createElement('h5');
      title.textContent = group.title;
      const row = document.createElement('div');
      row.className = 'bottle-mini-fields';
      group.fields.forEach((item) => {
        const field = getFieldById(fields, item.id);
        if (!field) return;
        row.appendChild(createArticleValueCard(field, units, values, item.label));
      });
      groupBlock.append(title, row);
      container.appendChild(groupBlock);
    });
  }

  function renderArticleFormatosFields(block, fields, units, values) {
    const fixedGrid = document.createElement('div');
    fixedGrid.className = 'field-grid formatos-fixed-grid';
    fields.forEach((field) => {
      if (isFormatosSpecialField(field)) return;
      fixedGrid.appendChild(createArticleValueCard(field, units, values));
    });
    if (fixedGrid.children.length) block.appendChild(fixedGrid);
    renderArticleAntaresGroup(block, fields, units, values);
    renderArticleLevasPlatos(block, fields, values);
  }

  function renderArticleAntaresGroup(container, fields, units, values) {
    const antaresFields = FORMATOS_ANTARES_FIELDS
      .map((item) => getFieldById(fields, item.id) || getFormatosFieldByName(fields, item.label))
      .filter(Boolean);
    if (!antaresFields.length) return;
    const group = document.createElement('div');
    group.className = 'antares-mini-card';
    const title = document.createElement('h5');
    title.textContent = 'Antares';
    const row = document.createElement('div');
    row.className = 'antares-mini-fields';
    antaresFields.forEach((field) => row.appendChild(createArticleValueCard(field, units, values)));
    group.append(title, row);
    container.appendChild(group);
  }

  function renderArticleLevasPlatos(container, fields, values) {
    const field = getLevasPlatosField(fields);
    if (!field) return;
    const rows = parseLevasPlatosRows(getArticleFieldValue(values, field));
    const block = document.createElement('div');
    block.className = 'levas-platos-block';
    const head = document.createElement('div');
    head.className = 'levas-platos-head';
    const title = document.createElement('h5');
    title.textContent = field.nombre || 'Levas Platos';
    head.appendChild(title);
    const table = document.createElement('div');
    table.className = 'levas-platos-table';
    ['N° Elementos', 'Acción', 'Inicio Master', 'Final Master', 'Posición Relativa Slave'].forEach((label) => {
      const cell = document.createElement('div');
      cell.className = 'levas-platos-header';
      cell.textContent = label;
      table.appendChild(cell);
    });
    rows.forEach((row) => {
      [row.numeroElemento, row.accion, row.inicioMaster, row.finalMaster, row.posicionRelativaSlave].forEach((value) => {
        const cell = document.createElement('div');
        cell.className = 'levas-platos-preview-cell';
        cell.textContent = formatEmptyAwareValue(value);
        table.appendChild(cell);
      });
    });
    block.append(head, table);
    container.appendChild(block);
  }

  function renderArticleMechanicalFields(block, fields, units, values) {
    const groupGrid = document.createElement('div');
    groupGrid.className = 'mechanical-mini-grid';
    MECHANICAL_GROUPS.forEach((group) => {
      const groupBlock = document.createElement('div');
      groupBlock.className = 'mechanical-mini-card';
      const title = document.createElement('h5');
      title.textContent = group.title;
      const row = document.createElement('div');
      row.className = 'mechanical-mini-fields';
      group.fields.forEach((item) => {
        const field = getFieldById(fields, item.id);
        if (!field) return;
        row.appendChild(createArticleValueCard(field, units, values, item.label));
      });
      groupBlock.append(title, row);
      groupGrid.appendChild(groupBlock);
    });
    block.appendChild(groupGrid);
    const matrix = document.createElement('div');
    matrix.className = 'mechanical-matrix-preview';
    matrix.appendChild(createMatrixHeaderCell('Posicionadores'));
    MECHANICAL_STATIONS.forEach((station) => matrix.appendChild(createMatrixHeaderCell(station.title)));
    MECHANICAL_MATRIX_ROWS.forEach((rowConfig) => {
      matrix.appendChild(createMatrixRowHeader(rowConfig.title));
      MECHANICAL_STATIONS.forEach((station) => {
        const field = getFieldById(fields, 'cam_' + station.key + '_' + rowConfig.suffix);
        const cell = document.createElement('div');
        cell.className = 'mechanical-matrix-cell';
        if (field) cell.appendChild(createArticleValueCard(field, units, values, '', true));
        matrix.appendChild(cell);
      });
    });
    block.appendChild(matrix);
  }

  function renderArticleCapsuladoraBypass(container, section, fields, values) {
    const block = document.createElement('section');
    block.className = 'draft-section capsuladora-bypass-mode';
    const title = document.createElement('h4');
    title.textContent = section.nombre;
    const bypassField = getCapsuladoraBypassField(fields);
    const info = document.createElement('div');
    info.className = 'capsuladora-mode-panel';
    const text = document.createElement('p');
    text.textContent = 'Producto de tapa. No aplican ajustes normales de capsuladora.';
    info.appendChild(text);
    if (bypassField) info.appendChild(createArticleValueCard(bypassField, state.admin.unidades || [], values));
    block.append(title, info);
    container.appendChild(block);
  }

  function renderArticleSimpleFields(block, fields, units, values) {
    const grid = document.createElement('div');
    grid.className = 'field-grid';
    fields.forEach((field) => grid.appendChild(createArticleValueCard(field, units, values)));
    block.appendChild(grid);
  }

  function createArticleValueCard(field, units, values, labelText, valueOnly) {
    const unit = getUnit(field, units);
    const card = document.createElement('div');
    card.className = isFeaturedBottleField(field) ? 'field-card article-value-card featured-bottle-field' : 'field-card article-value-card';
    if (valueOnly) {
      card.classList.add('value-only-card');
    } else {
      const label = document.createElement('strong');
      label.textContent = arguments.length >= 4 ? labelText : field.nombre;
      card.appendChild(label);
    }
    const value = document.createElement('span');
    value.textContent = formatArticleFieldValue(getArticleFieldValue(values, field), unit);
    card.appendChild(value);
    return card;
  }

  function getArticleFieldValue(values, field) {
    const match = (values || []).find((item) => (
      item.campoId === field.id ||
      normalizeClientText(item.campo) === normalizeClientText(field.nombre)
    ));
    return match ? (match.valor == null ? '' : match.valor) : '';
  }

  function formatArticleFieldValue(value, unit) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return 'Sin datos';
    return unit ? text + ' ' + unit.nombre : text;
  }

  function formatEmptyAwareValue(value) {
    const text = String(value == null ? '' : value).trim();
    return text ? text : 'Sin datos';
  }

  function articleCapsuladoraApplies(article, values) {
    const bypassValue = values.find((item) => isCapsuladoraBypassField({ id: item.campoId, nombre: item.campo }));
    if (bypassValue && String(bypassValue.valor || '').trim()) return false;
    return article.capsuladoraAplica !== false;
  }

  function fillSelect(id, rows, emptyText) {
    const select = document.getElementById(id);
    select.innerHTML = '';
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = emptyText;
    select.appendChild(empty);
    rows.forEach((row) => {
      const option = document.createElement('option');
      option.value = row.id;
      option.textContent = row.nombre;
      select.appendChild(option);
    });
    fillDraftSelects();
  }

  function uniqueClientValues(values) {
    return Array.from(new Set((values || []).filter(Boolean)));
  }

  function fillDraftSelects() {
    fillSearchComboOptions('draftCategoryOptions', state.admin.categorias || []);
    fillSearchComboOptions('draftBottleOptions', state.admin.botellas || []);
    syncDraftSearchField('category', true);
    syncDraftSearchField('bottle', true);
  }

  function fillSearchComboOptions(id, rows) {
    const datalist = document.getElementById(id);
    if (!datalist) return;
    datalist.innerHTML = '';
    rows.forEach((row) => {
      const option = document.createElement('option');
      option.value = row.nombre;
      option.dataset.id = row.id;
      datalist.appendChild(option);
    });
  }

  function syncDraftSearchField(type, keepExistingId) {
    const config = type === 'category'
      ? { inputId: 'draftCategorySearch', hiddenId: 'draftCategory', rows: state.admin.categorias || [] }
      : { inputId: 'draftBottleSearch', hiddenId: 'draftBottle', rows: state.admin.botellas || [] };
    const input = document.getElementById(config.inputId);
    const hidden = document.getElementById(config.hiddenId);
    if (!input || !hidden) return;
    if (keepExistingId && hidden.value) {
      const current = config.rows.find((row) => row.id === hidden.value);
      if (current) input.value = current.nombre;
      return;
    }
    const normalized = normalizeClientText(input.value);
    const match = config.rows.find((row) => normalizeClientText(row.nombre) === normalized);
    hidden.value = match ? match.id : '';
  }

  function setDraftSearchValue(type, id) {
    const rows = type === 'category' ? (state.admin.categorias || []) : (state.admin.botellas || []);
    const input = document.getElementById(type === 'category' ? 'draftCategorySearch' : 'draftBottleSearch');
    const hidden = document.getElementById(type === 'category' ? 'draftCategory' : 'draftBottle');
    const row = rows.find((item) => item.id === id);
    if (!input || !hidden) return;
    hidden.value = row ? row.id : '';
    input.value = row ? row.nombre : '';
  }

  function normalizeClientText(value) {
    return String(value || '')
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ');
  }

  function fillPlainSelect(id, rows, emptyText) {
    const select = document.getElementById(id);
    if (!select) return;
    const current = select.value;
    select.innerHTML = '<option value="">' + emptyText + '</option>';
    rows.forEach((row) => {
      const option = document.createElement('option');
      option.value = row.id;
      option.textContent = row.nombre;
      select.appendChild(option);
    });
    select.value = current;
  }

  function getUnit(field, units) {
    return units.find((item) => item.id === field.unidadId) || null;
  }

  function getFieldById(fields, id) {
    return fields.find((field) => field.id === id) || null;
  }

  function isFeaturedBottleField(field) {
    return field && FEATURED_BOTTLE_FIELD_IDS.indexOf(field.id) !== -1;
  }

  function isGroupedBottleField(field) {
    if (!field) return false;
    return BOTTLE_FIELD_GROUPS.some((group) => (
      group.fields.some((item) => item.id === field.id)
    ));
  }

  function isFormatosSection(section) {
    return section && (section.id === FORMATOS_SECTION_ID || normalizeClientText(section.nombre) === 'formatos');
  }

  function isCapsuladoraSection(section) {
    return section && (
      section.id === CAPSULADORA_SECTION_ID ||
      normalizeClientText(section.nombre) === 'ajustes de capsuladora'
    );
  }

  function isCapsuladoraBypassField(field) {
    return field && (
      field.id === CAPSULADORA_BYPASS_FIELD_ID ||
      normalizeClientText(field.nombre) === 'programa capsuladora bypass tapa'
    );
  }

  function isAntaresField(field) {
    if (!field) return false;
    return FORMATOS_ANTARES_FIELDS.some((item) => (
      item.id === field.id || normalizeClientText(item.label) === normalizeClientText(field.nombre)
    ));
  }

  function isLevasPlatosField(field) {
    return field && (field.id === LEVAS_PLATOS_FIELD_ID || normalizeClientText(field.nombre) === 'levas platos');
  }

  function isFormatosSpecialField(field) {
    if (!field) return false;
    return isLevasPlatosField(field) || isAntaresField(field);
  }

  function getFormatosFieldByName(fields, label) {
    const normalized = normalizeClientText(label);
    return fields.find((field) => normalizeClientText(field.nombre) === normalized) || null;
  }

  function getLevasPlatosField(fields) {
    return fields.find((field) => isLevasPlatosField(field)) || null;
  }

  function getCapsuladoraBypassField(fields) {
    return fields.find((field) => isCapsuladoraBypassField(field)) || null;
  }

  function fieldMetaText(field, units) {
    const unit = getUnit(field, units);
    const meta = [field.tipo];
    if (unit) meta.push(unit.nombre);
    if (field.obligatorio === true || field.obligatorio === 'TRUE') meta.push('Obligatorio');
    return meta.join(' · ');
  }

  function createFieldCard(field, units) {
    const card = document.createElement('div');
    card.className = isFeaturedBottleField(field) ? 'field-card featured-bottle-field' : 'field-card';
    card.innerHTML = '<strong>' + field.nombre + '</strong><span>' + fieldMetaText(field, units) + '</span>';
    return card;
  }

  function createDraftField(field, units, labelText) {
    const unit = getUnit(field, units);
    const label = document.createElement('label');
    const hasCustomLabel = arguments.length >= 3;
    const visibleLabel = hasCustomLabel ? labelText : field.nombre;
    if (visibleLabel) {
      label.textContent = visibleLabel + (unit ? ' (' + unit.nombre + ')' : '');
      if (isFeaturedBottleField(field)) label.classList.add('featured-bottle-input');
    } else {
      label.className = 'matrix-input-label';
      label.title = field.nombre + (unit ? ' (' + unit.nombre + ')' : '');
    }
    const input = document.createElement('input');
    input.className = 'draft-field';
    input.dataset.fieldId = field.id;
    input.dataset.fieldName = field.nombre;
    input.type = field.tipo === 'NUMERO' ? 'number' : 'text';
    input.required = field.obligatorio === true || field.obligatorio === 'TRUE';
    if (field.tipo === 'NUMERO') input.step = 'any';
    if (isPinzasField(field)) {
      input.maxLength = 120;
      input.pattern = '[A-Za-zÁÉÍÓÚÜÑáéíóúüñ0-9 \\-/() ]*';
      input.title = 'Acepta letras, números, espacios y los caracteres - / ( ). Ejemplo: 1/2 (AMARILLO)';
    }
    label.appendChild(input);
    return label;
  }

  function isPinzasField(field) {
    return field && (
      field.id === PINZAS_FIELD_ID ||
      normalizeClientText(field.nombre) === 'pinzas'
    );
  }

  function renderTemplateStructure() {
    const container = document.getElementById('templateStructure');
    if (!container) return;
    const sections = state.admin.secciones || [];
    const fields = state.admin.campos || [];
    const units = state.admin.unidades || [];
    fillPlainSelect('fieldSection', sections, 'Selecciona sección');
    fillPlainSelect('fieldUnit', units, 'Sin unidad');
    container.innerHTML = '';
    if (!sections.length) {
      container.innerHTML = '<div class="empty-state">No hay secciones configuradas.</div>';
      return;
    }
    sections.forEach((section) => {
      const sectionFields = fields
        .filter((field) => field.seccionId === section.id)
        .sort((a, b) => Number(a.orden || 0) - Number(b.orden || 0));
      const block = document.createElement('section');
      block.className = 'template-section';

    cell.className = 'mechanical-matrix-head';

  function renderDraftTechnicalFields() {
    const container = document.getElementById('draftTechnicalFields');
    if (!container) return;
    const sections = state.admin.secciones || [];
    const fields = state.admin.campos || [];
    const units = state.admin.unidades || [];
    container.innerHTML = '';
    if (!sections.length || !fields.length) {
      container.innerHTML = '<div class="empty-state">No hay estructura técnica cargada.</div>';
      return;
    }
    sections.forEach((section) => {
      const sectionFields = fields
        .filter((field) => field.seccionId === section.id)
        .sort((a, b) => Number(a.orden || 0) - Number(b.orden || 0));
      if (!sectionFields.length) return;
      const block = document.createElement('section');
      block.className = section.id === MECHANICAL_SECTION_ID ? 'draft-section mechanical-entry-section' : 'draft-section';
      const title = document.createElement('h4');
      title.textContent = section.nombre;
      if (section.id === MECHANICAL_SECTION_ID) {
        block.append(title);
        renderMechanicalDraftFields(block, sectionFields, units);
      } else if (section.id === 'sec_botella_insumos') {
        const grid = document.createElement('div');
        grid.className = 'draft-field-grid bottle-insumos-grid';
        sectionFields.forEach((field) => {
          if (isGroupedBottleField(field)) return;
          grid.appendChild(createDraftField(field, units));
        });
        renderBottleFieldGroups(grid, sectionFields, units, true);
        block.append(title, grid);
      } else if (isFormatosSection(section)) {
        block.append(title);
        renderFormatosDraftFields(block, sectionFields, units);
      } else if (isCapsuladoraSection(section)) {
        block.dataset.sectionRole = 'capsuladora';
        block.append(title);
        renderCapsuladoraDraftFields(block, sectionFields, units);
      } else {
        const grid = document.createElement('div');
        grid.className = 'draft-field-grid';
        sectionFields.forEach((field) => {
          if (isCapsuladoraSection(section) && isCapsuladoraBypassField(field)) return;
          grid.appendChild(createDraftField(field, units));
        });
        block.append(title, grid);
      }
      container.appendChild(block);
    });
    updateCapsuladoraMode();
  }

    const bypassLabel = document.createElement('label');

  function renderLevasPlatosTable(container, rows) {
    const fields = state.admin.campos || [];
    const levasField = getLevasPlatosField(fields) || { id: LEVAS_PLATOS_FIELD_ID, nombre: 'Levas Platos' };
    const block = document.createElement('div');
    block.className = 'levas-platos-block';
    block.dataset.fieldId = levasField.id;
    block.dataset.fieldName = levasField.nombre || 'Levas Platos';
    const head = document.createElement('div');
    head.className = 'levas-platos-head';
    const title = document.createElement('h5');
    title.textContent = 'Levas Platos';

    addButton.type = 'button';
    addButton.className = 'small-button levas-add-button';
    addButton.textContent = 'Agregar Leva';
    addButton.addEventListener('click', () => addLevasPlatosRow());
    head.append(title, addButton);

    const table = document.createElement('div');
    table.id = 'levasPlatosTable';
    table.className = 'levas-platos-table';
    ['N° Elementos', 'Acción', 'Inicio Master', 'Final Master', 'Posición Relativa Slave'].forEach((label) => {
      const cell = document.createElement('div');

      cell.textContent = label;

  function setLevasPlatosRows(rows) {
    const table = document.getElementById('levasPlatosTable');
    if (!table) return;
    Array.from(table.querySelectorAll('[data-levas-row]')).forEach((row) => row.remove());
    const safeRows = Array.isArray(rows) && rows.length ? rows : [{}];
    safeRows.forEach((row, index) => appendLevasPlatosRow(index, row));
  }

  function addLevasPlatosRow() {
    const table = document.getElementById('levasPlatosTable');
    if (!table) return;
    const nextIndex = table.querySelectorAll('.levas-platos-number').length;
    appendLevasPlatosRow(nextIndex, {});
  }

  function appendLevasPlatosRow(index, data) {
    const table = document.getElementById('levasPlatosTable');
    if (!table) return;
    const rowData = data || {};
    const numberCell = document.createElement('div');
    numberCell.className = 'levas-platos-number';
    numberCell.dataset.levasRow = String(index);
    numberCell.textContent = String(index);

    const actionCell = document.createElement('div');
    actionCell.className = 'levas-platos-action';
    actionCell.dataset.levasRow = String(index);
    actionCell.textContent = LEVAS_PLATOS_ACTION;

    const inicio = createLevasInput(index, 'inicioMaster', rowData.inicioMaster);
    const final = createLevasInput(index, 'finalMaster', rowData.finalMaster);
    const posicion = createLevasInput(index, 'posicionRelativaSlave', rowData.posicionRelativaSlave);
    table.append(numberCell, actionCell, inicio, final, posicion);
  }

  function createLevasInput(rowIndex, key, value) {
    const wrap = document.createElement('div');
    wrap.dataset.levasRow = String(rowIndex);
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'levas-platos-input';
    input.dataset.levasKey = key;
    input.value = value || '';
    wrap.appendChild(input);
    return wrap;
  }

  function collectLevasPlatosRows() {
    const table = document.getElementById('levasPlatosTable');
    if (!table) {
      return [{ numeroElemento: 0, accion: LEVAS_PLATOS_ACTION, inicioMaster: '', finalMaster: '', posicionRelativaSlave: '' }];
    }
    const rowCount = table.querySelectorAll('.levas-platos-number').length || 1;
    const rows = [];
    for (let index = 0; index < rowCount; index += 1) {
      const row = {
        numeroElemento: index,
        accion: LEVAS_PLATOS_ACTION,
        inicioMaster: '',
        finalMaster: '',
        posicionRelativaSlave: ''
      };
      table.querySelectorAll('[data-levas-row="' + index + '"] input').forEach((input) => {
        row[input.dataset.levasKey] = toUpperClientText(input.value);
        input.value = row[input.dataset.levasKey];
      });
      rows.push(row);
    }
    return rows;
  }

  function getLevasPlatosPayloadField() {
    const block = document.querySelector('.levas-platos-block[data-field-id]');
    const fields = state.admin.campos || [];
    const levasField = getLevasPlatosField(fields);
    return {
      id: block ? block.dataset.fieldId : (levasField ? levasField.id : LEVAS_PLATOS_FIELD_ID),
      name: block ? block.dataset.fieldName : (levasField ? levasField.nombre : 'Levas Platos')
    };
  }

  function getCapsuladoraBypassPayloadField() {
    const fields = state.admin.campos || [];
    const bypassField = getCapsuladoraBypassField(fields);
    return {
      id: bypassField ? bypassField.id : CAPSULADORA_BYPASS_FIELD_ID,
      name: bypassField ? bypassField.nombre : 'Programa capsuladora bypass tapa'
    };
  }

  function isCapsuladoraInput(input) {
    if (!input || !input.dataset) return false;
    const fields = state.admin.campos || [];
    const field = fields.find((item) => item.id === input.dataset.fieldId);
    if (!field || isCapsuladoraBypassField(field)) return false;
    const section = (state.admin.secciones || []).find((item) => item.id === field.seccionId);
    return isCapsuladoraSection(section);
  }

  function parseLevasPlatosRows(value) {
    let rows = value;
    if (typeof rows === 'string') rows = safeParseClientJson(rows);
    if (!Array.isArray(rows) || !rows.length) return [{}];
    return rows.map((row, index) => ({
      numeroElemento: index,
      accion: LEVAS_PLATOS_ACTION,
      inicioMaster: row && row.inicioMaster ? row.inicioMaster : '',
      finalMaster: row && row.finalMaster ? row.finalMaster : '',
      posicionRelativaSlave: row && row.posicionRelativaSlave ? row.posicionRelativaSlave : ''
    }));
  }

  function bindCatalogModal() {
    document.querySelectorAll('.catalog-action').forEach((button) => {
      button.addEventListener('click', () => openCatalogModal(button.dataset.catalog));
    });
    document.querySelectorAll('[data-close-modal]').forEach((item) => {
      item.addEventListener('click', closeCatalogModal);
    });
    const search = document.getElementById('catalogSearch');
    if (search) search.addEventListener('input', renderCatalogModalList);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeCatalogModal();
    });
  }

  function openCatalogModal(type) {
    const config = CATALOG_CONFIG[type];
    const modal = document.getElementById('catalogModal');
    if (!config || !modal) return;
    catalogModalState.active = type;
    document.getElementById('catalogModalEyebrow').textContent = config.eyebrow;
    document.getElementById('catalogModalTitle').textContent = config.title;
    document.querySelectorAll('.catalog-form').forEach((form) => {
      form.hidden = form.getAttribute('id') !== config.formId;
    });
    cancelCatalogEdit();
    const search = document.getElementById('catalogSearch');
    if (search) search.value = '';
    modal.hidden = false;
    document.body.classList.add('modal-open');
    renderCatalogModalList();
    const firstInput = document.querySelector('#' + config.formId + ' input');
    if (firstInput) window.setTimeout(() => firstInput.focus(), 60);
  }

  function closeCatalogModal() {
    const modal = document.getElementById('catalogModal');
    if (!modal || modal.hidden) return;
    modal.hidden = true;
    catalogModalState.active = '';
    document.body.classList.remove('modal-open');
  }

  function renderCatalogModalList() {
    const config = CATALOG_CONFIG[catalogModalState.active];
    const container = document.getElementById('catalogModalList');
    if (!config || !container) return;
    const search = document.getElementById('catalogSearch');
    const query = normalizeClientText(search ? search.value : '');
    const rows = (state.admin[config.rowsKey] || [])
      .slice()
      .sort((a, b) => String(a.nombre || '').localeCompare(String(b.nombre || ''), 'es'));
    const filtered = rows.filter((row) => normalizeClientText(row.nombre).includes(query));
    container.innerHTML = '';
    const summary = document.createElement('div');
    summary.className = 'catalog-list-summary';
    summary.textContent = filtered.length + ' de ' + rows.length + ' registros';
    container.appendChild(summary);
    if (!filtered.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = query ? 'No hay coincidencias.' : config.emptyText;
      container.appendChild(empty);
      return;
    }
    filtered.forEach((row) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      const label = document.createElement('span');
      label.textContent = row.nombre + (row.orden ? ' · Orden ' + row.orden : '');
      item.appendChild(label);
      if (['category', 'bottle', 'section'].indexOf(catalogModalState.active) !== -1) {
        const editButton = document.createElement('button');
        editButton.className = 'inline-action';
        editButton.type = 'button';
        editButton.textContent = 'Editar';
        editButton.addEventListener('click', () => startCatalogEdit(row));
        item.appendChild(editButton);
      }
      container.appendChild(item);
    });
  }
  function renderAdminLists() {
    renderCatalogModalList();
  }

          '<span>' + (article.descripcion || 'Sin descripción') + '</span>' +

        actions.appendChild(editButton);

        container.appendChild(item);
      });

  function getCatalogName(rows, id, fallback) {
    const match = (rows || []).find((item) => item.id === id);
    return match ? (match.nombre || fallback || '') : (fallback || '');

  function renderDiscardedCards(id, rows) {
    const container = document.getElementById(id);
    if (!container) return;
    container.innerHTML = '';
    if (!rows.length) {
      container.innerHTML = '<div class="empty-state">No hay productos descartados.</div>';
      return;
    }
    rows.forEach((draft) => {
      const item = document.createElement('div');
      item.className = 'draft-card';
      item.innerHTML =
        '<strong>' + (draft.borradorId || draft.id || 'SIN ID') + '</strong>' +
        '<span>' + (draft.motivo || 'Sin motivo registrado') + '</span>' +
        '<small>' + [draft.estado || 'DESCARTADO', draft.fechaDescarte || ''].filter(Boolean).join(' · ') + '</small>';
      container.appendChild(item);
    });

  function findPendingCode() {
    const input = document.getElementById('pendingCodeSearch');
    const result = document.getElementById('pendingCodeSearchResult');
    const code = toUpperClientText(input ? input.value : '');
    if (!result) return;
    if (!code) {
      showToast('Ingresa un código para buscar.');
      return;
    }
    result.hidden = false;
    result.className = 'code-search-result';
    result.textContent = 'Buscando código...';
    callServer('apiFindProductCode', { codigoArticulo: code })
      .then((rows) => renderCodeSearchResult(rows || [], code))
      .catch((error) => {
        result.className = 'code-search-result error';
        result.textContent = getErrorMessage(error, 'No fue posible buscar el código.');
      });

  function renderCodeSearchResult(rows, code) {
    const result = document.getElementById('pendingCodeSearchResult');
    if (!result) return;
    result.hidden = false;
    result.innerHTML = '';
    if (!rows.length) {
      result.className = 'code-search-result';
      result.textContent = 'No se encontró el código ' + code + ' en borradores, artículos activos ni descartados.';
      return;
    }
    result.className = 'code-search-result found';
    const title = document.createElement('strong');
    title.textContent = 'Resultado para ' + code;
    result.appendChild(title);
    rows.forEach((row) => {
      const item = document.createElement('div');
      item.className = 'code-search-item';
      item.innerHTML =
        '<span>' + (row.origen || 'SIN ORIGEN') + ' · ' + (row.estado || 'SIN ESTADO') + '</span>' +
        '<strong>' + (row.codigoArticulo || code) + '</strong>' +
        '<small>' + [row.descripcion || '', row.fechaModificacion || '', row.motivo || ''].filter(Boolean).join(' · ') + '</small>';
      result.appendChild(item);
    });
  }

  function toBooleanClient(value) {
    return value === true || value === 'TRUE' || value === 'true' || value === '1';
  }

  function continueDraft(draftId, button) {
    const draft = (state.drafts || []).find((item) => item.id === draftId);
    if (!draft) {
      showToast('No fue posible encontrar el borrador seleccionado.');
      return;
    }
    const originalLabel = button ? button.textContent : '';
    if (button) {
      button.disabled = true;
      button.classList.add('is-loading');
      button.textContent = 'Abriendo...';
    }
    setOperationStatus('Abriendo borrador pendiente...', 'info');
    callServer('apiAcquireDraftLock', { borradorId: draftId })
      .then(() => {
        loadDraftIntoForm(draft);
        openConfigPage('producto', { preserveDraft: true });
        showToast('Borrador cargado para edición.');
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible abrir el borrador.')))
      .finally(() => {
        if (button) {
          button.disabled = false;
          button.classList.remove('is-loading');
          button.textContent = originalLabel || 'Completar / revisar';
        }
        setOperationStatus('', '');
      });

  function editActiveArticle(articleId, button) {
    const article = (state.lookup.articulos || []).find((item) => item.id === articleId);
    if (!article) {
      showToast('No fue posible encontrar el producto activo seleccionado.');
      return;
    }
    const originalLabel = button ? button.textContent : '';
    if (button) {
      button.disabled = true;
      button.classList.add('is-loading');
      button.textContent = 'Abriendo...';
    }
    setOperationStatus('Abriendo producto activo...', 'info');
    window.setTimeout(() => {
      loadArticleIntoForm(article);
      openConfigPage('producto', { preserveDraft: true });
      showToast('Producto activo cargado para edición.');
      if (button) {
        button.disabled = false;
        button.classList.remove('is-loading');
        button.textContent = originalLabel || 'Editar';
      }
      setOperationStatus('', '');
    }, 40);

  function loadArticleIntoForm(article) {
    const form = document.getElementById('draftForm');
    if (!form) return;
    state.editingDraftId = '';
    state.editingArticleId = article.id || '';
    if (form.elements.id) form.elements.id.value = '';
    setDraftSearchValue('category', article.categoriaId || '');
    setDraftSearchValue('bottle', article.botellaId || '');
    if (form.codigoArticulo) form.codigoArticulo.value = article.codigoArticulo || '';
    if (form.descripcion) form.descripcion.value = article.descripcion || '';
    if (form.etqAplica) form.etqAplica.checked = toBooleanClient(article.etqAplica);
    if (form.codigoEtq) form.codigoEtq.value = article.codigoEtq || '';
    if (form.cetAplica) form.cetAplica.checked = toBooleanClient(article.cetAplica);
    if (form.codigoCet) form.codigoCet.value = article.codigoCet || '';
    const articleData = {
      valores: Array.isArray(article.valores) ? article.valores : [],
      capsuladoraAplica: article.capsuladoraAplica !== false,
      programaCapsuladoraBypassTapa: article.programaCapsuladoraBypassTapa || ''
    };
    if (form.capsuladoraAplica) form.capsuladoraAplica.checked = articleData.capsuladoraAplica !== false;
    if (form.programaCapsuladoraBypassTapa) form.programaCapsuladoraBypassTapa.value = articleData.programaCapsuladoraBypassTapa || getDraftTechnicalValueByName(articleData, 'Programa capsuladora bypass tapa') || '';
    updateCapsuladoraMode();
    fillDraftTechnicalValues({ payloadJson: JSON.stringify(articleData) });
    renderDraftImageStatus({ imagenes: Array.isArray(article.imagenes) ? article.imagenes : [] });
    renderDraftMode(article, 'article');
  }

  function loadDraftIntoForm(draft) {
    const form = document.getElementById('draftForm');
    if (!form) return;
    state.editingDraftId = draft.id || '';
    state.editingArticleId = '';
    if (form.elements.id) form.elements.id.value = draft.id || '';
    setDraftSearchValue('category', draft.categoriaId || '');
    setDraftSearchValue('bottle', draft.botellaId || '');
    if (form.codigoArticulo) form.codigoArticulo.value = draft.codigoArticulo || '';
    if (form.descripcion) form.descripcion.value = draft.descripcion || '';
    if (form.etqAplica) form.etqAplica.checked = toBooleanClient(draft.etqAplica);
    if (form.codigoEtq) form.codigoEtq.value = draft.codigoEtq || '';
    if (form.cetAplica) form.cetAplica.checked = toBooleanClient(draft.cetAplica);
    if (form.codigoCet) form.codigoCet.value = draft.codigoCet || '';
    const draftData = safeParseClientJson(draft.payloadJson);
    if (form.capsuladoraAplica) form.capsuladoraAplica.checked = draftData.capsuladoraAplica !== false;
    if (form.programaCapsuladoraBypassTapa) {
      form.programaCapsuladoraBypassTapa.value = draftData.programaCapsuladoraBypassTapa || getDraftTechnicalValueByName(draftData, 'Programa capsuladora bypass tapa') || '';
    }
    updateCapsuladoraMode();
    fillDraftTechnicalValues(draft);
    renderDraftImageStatus(draft);
    renderDraftMode(draft, 'draft');

  function renderDraftMode(draft, mode) {
    const notice = document.getElementById('draftModeNotice');
    const text = document.getElementById('draftModeText');
    if (!notice || !text) return;
    if (!draft || !draft.id) {
      notice.hidden = true;
      text.textContent = '';
      setProductFormActionMode('draft');
      return;
    }
    notice.hidden = false;
    if (mode === 'article') {
      notice.querySelector('strong').textContent = 'Editando producto activo';
      text.textContent = 'Editando ' + (draft.codigoArticulo || 'producto sin código') + '. Los cambios se guardarán sobre el producto activo.';
      setProductFormActionMode('article');
      return;
    }
    notice.querySelector('strong').textContent = 'Editando borrador pendiente';
    text.textContent = 'Editando ' + (draft.codigoArticulo || 'borrador sin código') + '. Los cambios se guardarán sobre este mismo pendiente.';
    setProductFormActionMode('draft');
  }

  function setProductFormActionMode(mode) {
    const draftButton = document.querySelector('#draftForm button[data-action="draft"]');
    const activateButton = document.querySelector('#draftForm button[data-action="activate"]');
    if (!draftButton || !activateButton) return;
    if (mode === 'article') {
      draftButton.hidden = true;
      activateButton.textContent = 'Guardar cambios';
      return;
    }
    draftButton.hidden = false;
    draftButton.textContent = 'Guardar borrador';
    activateButton.textContent = 'Guardar y activar';
  }

  function updateCapsuladoraMode() {
    const form = document.getElementById('draftForm');
    if (!form || !form.capsuladoraAplica) return;
    const applies = form.capsuladoraAplica.checked;
    const text = document.getElementById('capsuladoraModeText');
    const bypassField = document.getElementById('capsuladoraBypassField');
    const bypassInput = form.programaCapsuladoraBypassTapa;
    document.querySelectorAll('[data-section-role="capsuladora"]').forEach((section) => {
      section.classList.toggle('capsuladora-bypass-mode', !applies);
    });
    document.querySelectorAll('[data-capsuladora-fields="true"]').forEach((grid) => {
      grid.hidden = !applies;
      grid.querySelectorAll('input, select, textarea').forEach((control) => {
        control.disabled = !applies;
      });
    });
    if (text) {
      text.textContent = applies
        ? 'Producto con capsuladora activa. Completa los ajustes correspondientes en esta sección.'
        : 'Producto de tapa. No se solicitan ajustes de capsuladora; registra solo el programa bypass para tapa.';
    }
    if (bypassField) bypassField.hidden = applies;
    if (bypassInput) {
      bypassInput.disabled = applies;
      if (applies) bypassInput.value = '';
    }
  }

  function startNewDraft() {
    const editingId = state.editingDraftId;
    const form = document.getElementById('draftForm');
    const reset = () => {
      resetDraftForm(form);
      showToast('Formulario listo para un producto nuevo.');
    };
    if (!editingId) {
      reset();
      return;
    }
    setOperationStatus('Cerrando edición del borrador...', 'info');
    callServer('apiReleaseDraftLock', { borradorId: editingId })
      .catch(() => null)
      .then(reset)
      .finally(() => setOperationStatus('', ''));
  }

  function resetDraftForm(form) {
    if (!form) return;
    form.reset();
    state.editingDraftId = '';
    state.editingArticleId = '';
    if (form.elements.id) form.elements.id.value = '';
    setDraftSearchValue('category', '');
    setDraftSearchValue('bottle', '');
    if (form.capsuladoraAplica) form.capsuladoraAplica.checked = true;
    if (form.programaCapsuladoraBypassTapa) form.programaCapsuladoraBypassTapa.value = '';
    setLevasPlatosRows([]);
    updateCapsuladoraMode();
    clearImageInputs(form);
    renderDraftMode(null);
  }

  function fillDraftTechnicalValues(draft) {
    const data = safeParseClientJson(draft.payloadJson);
    const values = Array.isArray(data.valores) ? data.valores : [];
    document.querySelectorAll('.draft-field').forEach((input) => {
      const match = values.find((item) => (
        item.campoId === input.dataset.fieldId ||
        normalizeClientText(item.campo) === normalizeClientText(input.dataset.fieldName)
      ));
      input.value = match ? (match.valor || '') : '';
    });
    const levasField = getLevasPlatosField(state.admin.campos || []);
    const levas = values.find((item) => (
      item.campoId === LEVAS_PLATOS_FIELD_ID ||
      (levasField && item.campoId === levasField.id) ||
      normalizeClientText(item.campo) === 'levas platos'
    ));
    setLevasPlatosRows(parseLevasPlatosRows(levas ? levas.valor : []));
  }

  function getDraftTechnicalValueByName(data, fieldName) {
    const values = Array.isArray(data && data.valores) ? data.valores : [];
    const normalized = normalizeClientText(fieldName);
    const match = values.find((item) => normalizeClientText(item.campo) === normalized);
    return match ? (match.valor || '') : '';
  }

  function safeParseClientJson(value) {
    if (!value) return {};
    if (typeof value === 'object') return value;
    try {
      return JSON.parse(value);
    } catch (ignored) {
      return {};
    }
  }

  function renderDraftImageStatus(draft) {
    const images = draft && Array.isArray(draft.imagenes) ? draft.imagenes : [];
    ['ETQ', 'CET'].forEach((type) => {
      const status = document.querySelector('[data-image-status="' + type + '"]');
      if (!status) return;
      const image = images.find((item) => item.tipoImagen === type);
      status.innerHTML = '';
      if (!image) {
        status.textContent = 'Sin imagen guardada.';
        status.className = 'image-status';
        return;
      }
      status.className = 'image-status saved';
      const link = document.createElement('a');
      link.href = image.url || '#';
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = 'Imagen ' + type + ' guardada: ' + (image.nombreArchivo || image.codigo || 'archivo PNG');
      status.appendChild(link);
    });
  }

  function renderHistory() {
    const container = document.getElementById('historyList');
    container.innerHTML = '';
    if (!state.history.length) {
      container.innerHTML = '<div class="empty-state">Sin historial registrado.</div>';
      return;
    }
    state.history.forEach((event) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.textContent = event.fecha + ' | ' + event.usuario + ' | ' + event.tipoAccion + ' | ' + event.motivo;
      container.appendChild(item);
    });
  }

  function toUpperClientText(value) {
    return String(value || '').trim().replace(/\s+/g, ' ').toUpperCase();
  }

  function submitCatalog(functionName) {
    return function(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = Object.fromEntries(new FormData(form).entries());
      payload.nombre = toUpperClientText(payload.nombre);
      if (form.nombre) form.nombre.value = payload.nombre;
      setFormBusy(form, true, 'Creando registro...');
      callServer(functionName, payload)
        .then(() => {
          form.reset();
          showToast('Registro creado.');
          loadInitialData();
        })
        .catch((error) => showToast(getErrorMessage(error, 'No fue posible crear el registro.')))
        .finally(() => setFormBusy(form, false));
    };
  }

  function submitEditableCatalog(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const config = getCatalogConfigByForm(form.getAttribute('id'));
    if (!config) return;
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.nombre = toUpperClientText(payload.nombre);
    if (form.nombre) form.nombre.value = payload.nombre;
    const functionName = payload.id ? config.updateFunction : config.createFunction;
    setFormBusy(form, true, payload.id ? 'Guardando cambios del catálogo...' : 'Creando registro de catálogo...');
    callServer(functionName, payload)
      .then(() => {
        const wasEditing = !!payload.id;
        form.reset();
        cancelCatalogEdit(false);
        showToast(wasEditing ? 'Registro actualizado.' : 'Registro creado.');
        loadInitialData();
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible guardar el registro.')))
      .finally(() => setFormBusy(form, false));
  }

  function getCatalogConfigByForm(formId) {
    return Object.keys(CATALOG_CONFIG)
      .map((key) => CATALOG_CONFIG[key])
      .find((config) => config.formId === formId) || null;
  }

  function startCatalogEdit(row) {
    const config = CATALOG_CONFIG[catalogModalState.active];
    if (!config || !row) return;
    const form = document.getElementById(config.formId);
    if (!form) return;
    catalogModalState.editingId = row.id;
    if (form.elements.id) form.elements.id.value = row.id || '';
    if (form.nombre) form.nombre.value = row.nombre || config.defaultName || '';
    if (form.orden) form.orden.value = row.orden || '';
    const submitButton = document.getElementById(config.submitButtonId);
    const cancelButton = document.getElementById(config.cancelButtonId);
    if (submitButton) submitButton.textContent = config.saveLabel;
    if (cancelButton) cancelButton.hidden = false;
    if (form.nombre) form.nombre.focus();
  }

  function cancelCatalogEdit(resetForm) {
    const config = CATALOG_CONFIG[catalogModalState.active];
    if (!config) return;
    const form = document.getElementById(config.formId);
    if (!form) return;
    catalogModalState.editingId = '';
    if (resetForm !== false) form.reset();
    if (form.elements.id) form.elements.id.value = '';
    if (form.nombre && config.defaultName) form.nombre.value = config.defaultName;
    const submitButton = document.getElementById(config.submitButtonId);
    const cancelButton = document.getElementById(config.cancelButtonId);
    if (submitButton) submitButton.textContent = config.addLabel;
    if (cancelButton) cancelButton.hidden = true;
  }

  function cancelSectionEdit(resetForm) {
    cancelCatalogEdit(resetForm);
  }
  function submitField(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.nombre = toUpperClientText(payload.nombre);
    if (form.nombre) form.nombre.value = payload.nombre;
    payload.obligatorio = form.obligatorio.checked;
    setFormBusy(form, true, 'Creando campo de ficha técnica...');
    callServer('apiCreateField', payload)
      .then(() => {
        form.reset();
        showToast('Campo creado.');
        loadInitialData();
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible crear el campo.')))
      .finally(() => setFormBusy(form, false));
  }

  function readImageInput(form, type, draftId) {
    const input = form.querySelector('.image-input[data-image-type="' + type + '"]');
    const file = input && input.files ? input.files[0] : null;
    if (!file) return Promise.resolve(null);
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = String(reader.result || '');
        resolve({
          borradorId: draftId,
          tipoImagen: type,
          codigo: type === 'ETQ' ? form.codigoEtq.value : form.codigoCet.value,
          nombreArchivo: file.name,
          mimeType: file.type,
          base64: result.split(',')[1] || ''
        });
      };
      reader.onerror = () => reject(new Error('No fue posible leer la imagen ' + type + '.'));
      reader.readAsDataURL(file);
    });
  }

  function uploadDraftImages(draftId, form) {
    return Promise.all([
      readImageInput(form, 'ETQ', draftId),
      readImageInput(form, 'CET', draftId)
    ])
      .then((payloads) => payloads.filter(Boolean))
      .then((payloads) => payloads.reduce((chain, payload) => (
        chain.then(() => callServer('apiUploadDraftImage', payload))
      ), Promise.resolve()));
  }

  function uploadArticleImages(articleId, form) {
    return Promise.all([
      readImageInput(form, 'ETQ', articleId),
      readImageInput(form, 'CET', articleId)
    ])
      .then((payloads) => payloads.filter(Boolean).map((payload) => {
        payload.articuloId = articleId;
        delete payload.borradorId;
        return payload;
      }))
      .then((payloads) => payloads.reduce((chain, payload) => (
        chain.then(() => callServer('apiUploadImage', payload))
      ), Promise.resolve()));
  }

  function clearImageInputs(form) {
    form.querySelectorAll('.image-input').forEach((input) => {
      input.value = '';
    });
    renderDraftImageStatus(null);
  }

  function saveDraft(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    const action = event.submitter && event.submitter.dataset.action === 'activate' ? 'activate' : 'draft';
    const currentEditingId = state.editingDraftId || (form.elements.id ? form.elements.id.value : '');
    if (currentEditingId && (!payload.id || payload.id === currentEditingId)) {
      payload.id = currentEditingId;
      if (form.elements.id) form.elements.id.value = currentEditingId;
    } else {
      payload.id = '';
      if (form.elements.id) form.elements.id.value = '';
    }
    syncDraftSearchField('category');
    syncDraftSearchField('bottle');
    payload.categoriaId = form.categoriaId.value;
    payload.botellaId = form.botellaId.value;
    if (!payload.categoriaId) {
      showToast('Selecciona una categoría válida desde la lista.');
      return;
    }
    if (!payload.botellaId) {
      showToast('Selecciona una botella válida desde la lista.');
      return;
    }
    ['codigoArticulo', 'descripcion', 'codigoEtq', 'codigoCet'].forEach((key) => {
      payload[key] = toUpperClientText(payload[key]);
      if (form[key]) form[key].value = payload[key];
    });
    payload.etqAplica = form.etqAplica.checked;
    payload.cetAplica = form.cetAplica.checked;
    payload.etapa = 'FICHA_TECNICA';
    const levasPayloadField = getLevasPlatosPayloadField();
    const capsuladoraAplica = form.capsuladoraAplica ? form.capsuladoraAplica.checked : true;
    const bypassValue = !capsuladoraAplica && form.programaCapsuladoraBypassTapa
      ? toUpperClientText(form.programaCapsuladoraBypassTapa.value)
      : '';
    if (form.programaCapsuladoraBypassTapa) form.programaCapsuladoraBypassTapa.value = bypassValue;
    if (!capsuladoraAplica && !bypassValue) {
      showToast('Ingresa el programa capsuladora bypass tapa.');
      return;
    }
    const technicalValues = Array.from(document.querySelectorAll('.draft-field'))
      .filter((input) => !input.disabled && (capsuladoraAplica || !isCapsuladoraInput(input)))
      .map((input) => ({
        campoId: input.dataset.fieldId,
        campo: input.dataset.fieldName,
        valor: toUpperClientText(input.value)
      }));
    if (!capsuladoraAplica && bypassValue) {
      const bypassField = getCapsuladoraBypassPayloadField();
      technicalValues.push({
        campoId: bypassField.id,
        campo: bypassField.name,
        valor: bypassValue
      });
    }
    payload.payload = {
      capsuladoraAplica: capsuladoraAplica,
      programaCapsuladoraBypassTapa: bypassValue,
      valores: technicalValues.concat([{
        campoId: levasPayloadField.id,
        campo: levasPayloadField.name,
        valor: JSON.stringify(collectLevasPlatosRows())
      }])
    };
    if (state.editingArticleId) {
      payload.id = state.editingArticleId;
      setFormBusy(form, true, 'Guardando cambios del producto activo...');
      callServer('apiUpdateArticle', payload)
        .then((article) => uploadArticleImages(article.id, form)
          .then(() => ({ article: article, imageWarning: '' }))
          .catch((error) => ({
            article: article,
            imageWarning: getErrorMessage(error, 'El producto quedó guardado, pero la imagen no pudo guardarse.')
          })))
        .then((result) => {
          resetDraftForm(form);
          showToast(result.imageWarning ? 'Producto actualizado. Imagen pendiente: ' + result.imageWarning : 'Producto activo actualizado.');
          loadInitialData();
        })
        .catch((error) => showToast(getErrorMessage(error, 'No fue posible actualizar el producto activo.')))
        .finally(() => {
          setFormBusy(form, false);
          updateCapsuladoraMode();
        });
      return;
    }
    setFormBusy(form, true, action === 'activate' ? 'Guardando y activando producto...' : 'Guardando borrador...');
    callServer('apiSaveDraft', payload)
      .then((savedDraft) => uploadDraftImages(savedDraft.id, form)
        .then(() => ({ savedDraft: savedDraft, imageWarning: '' }))
        .catch((error) => ({
          savedDraft: savedDraft,
          imageWarning: getErrorMessage(error, 'El borrador quedó guardado, pero la imagen no pudo guardarse.')
        })))
      .then((result) => {
        const savedDraft = result.savedDraft;
        if (result.imageWarning && action === 'activate') {
          return callServer('apiReleaseDraftLock', { borradorId: savedDraft.id })
            .catch(() => null)
            .then(() => {
              resetDraftForm(form);
              showToast('Borrador guardado. No se activó porque la imagen no pudo guardarse: ' + result.imageWarning);
              loadInitialData();
              return null;
            });
        }
        if (action !== 'activate') {
          return callServer('apiReleaseDraftLock', { borradorId: savedDraft.id })
            .catch(() => null)
            .then(() => {
              resetDraftForm(form);
              showToast(result.imageWarning ? 'Borrador guardado. Imagen pendiente: ' + result.imageWarning : 'Borrador guardado.');
              loadInitialData();
              return null;
            });
        }
        return callServer('apiActivateDraft', { borradorId: savedDraft.id })
          .then(() => {
            resetDraftForm(form);
            showToast('Producto guardado y activado.');
            loadInitialData();
            return null;
          });
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible guardar el producto.')))
      .finally(() => {
        setFormBusy(form, false);
        updateCapsuladoraMode();
      });
  }
  function validateImageInput(event) {
    const file = event.target.files[0];
    if (!file) return;
    const imageType = event.target.dataset.imageType || 'imagen';
    if (file.type !== 'image/png') {
      event.target.value = '';
      showToast('Solo se aceptan imágenes PNG para ' + imageType + '.');
      return;
    }
    if (file.size > 1024 * 1024) {
      event.target.value = '';
      showToast('La imagen ' + imageType + ' supera el máximo permitido de 1 MB.');
    }
  }

  function generatePdf() {
    const articuloId = document.getElementById('articleSelect').value;
    setOperationStatus('Generando PDF...', 'info');
    callServer('apiGeneratePdf', { articuloId })
      .then((file) => {
        showToast('PDF generado.');
        window.open(file.url, '_blank');
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible generar el PDF.')))
      .finally(() => setOperationStatus('', ''));
  }

  function createBackup() {
    setOperationStatus('Generando respaldo...', 'info');
    callServer('apiCreateBackup')
      .then((file) => {
        showToast('Respaldo creado.');
        window.open(file.url, '_blank');
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible crear el respaldo.')))
      .finally(() => setOperationStatus('', ''));
  }

  function runDatabaseAudit() {
    const button = document.getElementById('auditButton');
    const result = document.getElementById('auditResult');
    setButtonBusy(button, true, 'Auditando...');
    result.className = 'audit-result empty-state';
    result.textContent = 'Revisando base de datos...';
    setOperationStatus('Auditando base de datos...', 'info');
    callServer('apiRunDatabaseAudit')
      .then((audit) => {
        renderAuditResult(audit);
        showToast(audit.estado === 'OK' ? 'Auditoría sin observaciones.' : 'Auditoría completada con observaciones.');
      })
      .catch((error) => {
        result.className = 'audit-result empty-state error-state';
        result.textContent = getErrorMessage(error, 'No fue posible auditar la base.');
        showToast(getErrorMessage(error, 'No fue posible auditar la base.'));
      })
      .finally(() => {
        setButtonBusy(button, false);
        setOperationStatus('', '');
      });
  }

  function renderAuditResult(audit) {
    const result = document.getElementById('auditResult');
    result.className = 'audit-result ' + (audit.estado === 'OK' ? 'ok' : 'warning');
    result.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'audit-result-head';
    const title = document.createElement('strong');
    title.textContent = audit.estado === 'OK' ? 'Base sin observaciones críticas' : 'Base con observaciones';
    const date = document.createElement('span');
    date.textContent = audit.fecha || '';
    header.append(title, date);
    result.appendChild(header);

    const summary = document.createElement('div');
    summary.className = 'audit-summary-grid';
    [
      ['Borradores pendientes', audit.resumen.borradoresPendientes],
      ['Productos activos', audit.resumen.articulosActivos],
      ['Valores de artículos', audit.resumen.valoresArticulo],
      ['Imágenes registradas', audit.resumen.imagenesArticulo],
      ['Eventos historial', audit.resumen.historialEventos],
      ['Detalle historial', audit.resumen.historialDetalle]
    ].forEach(([label, value]) => {
      const item = document.createElement('div');
      item.className = 'audit-summary-item';
      item.innerHTML = '<span>' + label + '</span><strong>' + String(value || 0) + '</strong>';
      summary.appendChild(item);
    });
    result.appendChild(summary);

    result.appendChild(createAuditList('Observaciones', audit.alertas || []));
    result.appendChild(createAuditList('Códigos duplicados', formatDuplicateCodeAuditRows(audit)));
    result.appendChild(createAuditList('Formato texto revisado', (audit.formatosTexto || []).map((item) => (
      item.hoja + ' / ' + item.columna + ': ' + (item.formatoTexto ? 'OK' : item.celdasSinFormatoTexto + ' celdas sin formato texto')
    ))));
    result.appendChild(createAuditList('Detalle de activos', (audit.integridad.articulosActivos || []).map((item) => (
      item.codigoArticulo + ' - valores: ' + item.valores + ', imágenes activas: ' + item.imagenesActivas
    ))));
    result.appendChild(createAuditList('Detalle de pendientes', (audit.integridad.borradoresPendientes || []).map((item) => (
      item.codigoArticulo + ' - valores en payload: ' + (item.payloadTieneValores ? 'sí' : 'no') + ', imágenes activas: ' + item.imagenesActivas
    ))));
  }

  function formatDuplicateCodeAuditRows(audit) {
    return (((audit || {}).duplicados || {}).codigosArticulo || []).map((duplicate) => {
      const records = (duplicate.registros || []).map((row) => (
        (row.codigoArticulo || duplicate.clave) +
        ' [' + (row.estado || 'SIN ESTADO') + '] ' +
        (row.id || 'sin id') +
        (row.descripcion ? ' - ' + row.descripcion : '')
      ));
      return duplicate.clave + ' (' + duplicate.cantidad + ' registros): ' + records.join(' | ');
    });
  }

  function createAuditList(titleText, rows) {
    const block = document.createElement('section');
    block.className = 'audit-list-block';
    const title = document.createElement('h4');
    title.textContent = titleText;
    block.appendChild(title);
    const list = document.createElement('ul');
    (rows && rows.length ? rows : ['Sin registros.']).forEach((text) => {
      const item = document.createElement('li');
      item.textContent = text;
      list.appendChild(item);
    });
    block.appendChild(list);
    return block;
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    window.setTimeout(() => toast.classList.remove('show'), 4500);
  }
</script>
