<script>
  const state = {
    lookup: { categorias: [], botellas: [], relaciones: [], articulos: [] },
    admin: {},
    drafts: [],
    discarded: [],
    history: [],
    user: null
  };

  const catalogModalState = { active: '', editingSectionId: '' };

  const CATALOG_CONFIG = {
    category: {
      eyebrow: 'Catálogo',
      title: 'Agregar categoría',
      formId: 'categoryForm',
      rowsKey: 'categorias',
      emptyText: 'No hay categorías registradas.'
    },
    bottle: {
      eyebrow: 'Catálogo',
      title: 'Agregar botella',
      formId: 'bottleForm',
      rowsKey: 'botellas',
      emptyText: 'No hay botellas registradas.'
    },
    section: {
      eyebrow: 'Ficha técnica',
      title: 'Agregar sección',
      formId: 'sectionForm',
      rowsKey: 'secciones',
      emptyText: 'No hay secciones registradas.'
    },
    unit: {
      eyebrow: 'Ficha técnica',
      title: 'Agregar unidad',
      formId: 'unitForm',
      rowsKey: 'unidades',
      emptyText: 'No hay unidades registradas.'
    }
  };
  const LOCAL_TEMPLATE = {
    secciones: [
      { id: 'sec_botella_insumos', nombre: 'Botella e Insumos', orden: 10 },
      { id: 'sec_ajustes_etiquetadora', nombre: 'Ajustes Mecánicos de Etiquetadora', orden: 20 },
      { id: 'sec_ajustes_capsuladora', nombre: 'Ajustes de Capsuladora', orden: 30 }
    ],
    unidades: [
      { id: 'uni_mm', nombre: 'mm', orden: 10 },
      { id: 'uni_m_min', nombre: 'm/min', orden: 20 }
    ],
    campos: [
      { id: 'cam_tipo_botella', seccionId: 'sec_botella_insumos', nombre: 'Tipo de botella', tipo: 'TEXTO', obligatorio: true, orden: 10 },
      { id: 'cam_medidas_etiqueta', seccionId: 'sec_botella_insumos', nombre: 'Medidas etiqueta', tipo: 'TEXTO', obligatorio: true, orden: 20 },
      { id: 'cam_altura_pegado_etiqueta', seccionId: 'sec_botella_insumos', nombre: 'Altura de pegado (etiqueta)', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: true, orden: 30 },
      { id: 'cam_altura_contra_etiqueta', seccionId: 'sec_botella_insumos', nombre: 'Altura contra-etiqueta', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 40 },
      { id: 'cam_altura_medalla', seccionId: 'sec_botella_insumos', nombre: 'Altura medalla', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 50 },
      { id: 'cam_entrada_guia_sin_fin', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Entrada guía sin fin', tipo: 'TEXTO', obligatorio: false, orden: 10 },
      { id: 'cam_guia_botellas', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Guía de botellas', tipo: 'TEXTO', obligatorio: false, orden: 20 },
      { id: 'cam_altura_estrella', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Altura de estrella', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 30 },
      { id: 'cam_levas', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Levas', tipo: 'TEXTO', obligatorio: false, orden: 40 },
      { id: 'cam_altura_estaciones', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Altura estaciones', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 50 },
      { id: 'cam_profundidad_estaciones', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Profundidad estaciones', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 60 },
      { id: 'cam_ajuste_lateral', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Ajuste lateral', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 70 },
      { id: 'cam_velocidad_emision', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Velocidad emisión', tipo: 'NUMERO', unidadId: 'uni_m_min', obligatorio: false, orden: 80 },
      { id: 'cam_distancia_etiqueta', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Distancia de etiqueta', tipo: 'NUMERO', unidadId: 'uni_mm', obligatorio: false, orden: 90 },
      { id: 'cam_tipo_chaleco', seccionId: 'sec_ajustes_etiquetadora', nombre: 'Tipo de chaleco', tipo: 'TEXTO', obligatorio: false, orden: 100 },
      { id: 'cam_formato_capsula', seccionId: 'sec_ajustes_capsuladora', nombre: 'N° formato (cápsula)', tipo: 'TEXTO', obligatorio: false, orden: 10 },
      { id: 'cam_formato_botella', seccionId: 'sec_ajustes_capsuladora', nombre: 'N° formato (botella)', tipo: 'TEXTO', obligatorio: false, orden: 20 },
      { id: 'cam_color_formato', seccionId: 'sec_ajustes_capsuladora', nombre: 'Color de formato', tipo: 'TEXTO', obligatorio: false, orden: 30 },
      { id: 'cam_material_capsula', seccionId: 'sec_ajustes_capsuladora', nombre: 'Material (PVC / Complex)', tipo: 'TEXTO', obligatorio: false, orden: 40 },
      { id: 'cam_sinfin_capsuladora', seccionId: 'sec_ajustes_capsuladora', nombre: 'Sinfín capsuladora', tipo: 'TEXTO', obligatorio: false, orden: 50 }
    ]
  };

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    bindTabs();
    bindConfigTabs();
    bindForms();
    renderLocalShell();
    loadInitialData();
  }

  function renderLocalShell() {
    state.admin = {
      categorias: [],
      botellas: [],
      relaciones: [],
      secciones: LOCAL_TEMPLATE.secciones,
      campos: LOCAL_TEMPLATE.campos,
      unidades: LOCAL_TEMPLATE.unidades
    };
    state.lookup = { categorias: [], botellas: [], relaciones: [], articulos: [] };
    state.drafts = [];
    state.discarded = [];
    state.history = [];
    setConnectionStatus('Aplicación disponible');
    setUserInfo({ displayName: 'Usuario Google', identified: false });
    setGlobalStatus('Interfaz disponible. Verificando conexión con la base de datos...', 'info');
    renderAll();
  }

  function bindTabs() {
    document.querySelectorAll('.tab-button').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach((item) => item.classList.remove('active'));
        document.querySelectorAll('.view').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        document.getElementById('view-' + button.dataset.view).classList.add('active');
      });
    });
  }

  function bindConfigTabs() {
    document.querySelectorAll('.config-tab').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.config-tab').forEach((item) => item.classList.remove('active'));
        document.querySelectorAll('.config-page').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        document.getElementById('config-page-' + button.dataset.configPage).classList.add('active');
      });
    });
  }

  function bindForms() {
    document.getElementById('categoryForm').addEventListener('submit', submitCatalog('apiCreateCategory'));
    document.getElementById('bottleForm').addEventListener('submit', submitCatalog('apiCreateBottle'));
    document.getElementById('sectionForm').addEventListener('submit', submitSection);
    document.getElementById('sectionCancelEdit').addEventListener('click', cancelSectionEdit);
    document.getElementById('unitForm').addEventListener('submit', submitCatalog('apiCreateUnit'));
    document.getElementById('fieldForm').addEventListener('submit', submitField);
    document.getElementById('draftForm').addEventListener('submit', saveDraft);
    document.getElementById('backupButton').addEventListener('click', createBackup);
    document.querySelectorAll('.image-input').forEach((input) => {
      input.addEventListener('change', validateImageInput);
    });
    document.getElementById('categorySelect').addEventListener('change', renderBottleSelect);
    document.getElementById('bottleSelect').addEventListener('change', renderArticleSelect);
    document.getElementById('articleSelect').addEventListener('change', renderArticleDetail);
    document.getElementById('pdfButton').addEventListener('click', generatePdf);
    bindCatalogModal();
  }

  function callServer(functionName, payload) {
    return new Promise((resolve, reject) => {
      const timeout = window.setTimeout(() => {
        reject(new Error('Apps Script no respondió en 20 segundos. Recarga la página e intenta nuevamente.'));
      }, 20000);
      google.script.run
        .withSuccessHandler((response) => {
          window.clearTimeout(timeout);
          if (response && response.ok) {
            resolve(response.data);
            return;
          }
          reject(new Error(getErrorMessage(response, 'La función ' + functionName + ' no devolvió una respuesta válida.')));
        })
        .withFailureHandler((error) => {
          window.clearTimeout(timeout);
          reject(new Error(getErrorMessage(error, 'No fue posible ejecutar ' + functionName + '.')));
        })
        [functionName](payload);
    });
  }

  function getErrorMessage(error, fallback) {
    if (!error) return fallback || 'Ocurrió un error sin detalle.';
    if (typeof error === 'string') return error;
    if (error.message) return error.message;
    if (error.errorMessage) return error.errorMessage;
    try {
      return JSON.stringify(error);
    } catch (ignored) {
      return fallback || 'Ocurrió un error sin detalle.';
    }
  }

  function loadInitialData() {
    const slowLoadTimer = window.setTimeout(() => {
      setConnectionStatus('Verificando base de datos');
      setGlobalStatus('La base de datos está tardando más de lo esperado. La interfaz permanece disponible.', 'warning');
      renderLoadWarnings(['La base de datos está tardando más de lo esperado. La interfaz permanece disponible.']);
    }, 8000);
    callServer('apiPing')
      .then((ping) => {
        if (ping && ping.user) setUserInfo(ping.user);
        return callServer('apiGetInitialData');
      })
      .then((data) => {
        window.clearTimeout(slowLoadTimer);
        state.user = data.user;
        state.lookup = data.lookup;
        state.admin = data.admin;
        state.drafts = data.drafts;
        state.discarded = data.discarded;
        state.history = data.history;
        setConnectionStatus('Aplicación disponible');
        setUserInfo(data.user);
        setGlobalStatus('Base técnica cargada. Verificando datos guardados...', 'info');
        renderLoadWarnings(data.warnings || []);
        renderAll();
        syncSavedData();
      })
      .catch((error) => {
        const message = getErrorMessage(error, 'No fue posible conectar con la base de datos.');
        window.clearTimeout(slowLoadTimer);
        setConnectionStatus('Aplicación disponible');
        setGlobalStatus('No fue posible verificar Apps Script. Detalle: ' + message, 'error');
        renderLoadWarnings(['No fue posible verificar Apps Script: ' + message]);
        showToast(message);
      });
  }

  function syncSavedData() {
    callServer('apiCheckSheets')
      .then((sheetCheck) => {
        if (sheetCheck && sheetCheck.user) setUserInfo(sheetCheck.user);
        return callServer('apiGetSavedData');
      })
      .then((data) => {
        state.user = data.user || state.user;
        state.lookup = data.lookup || state.lookup;
        state.admin = data.admin || state.admin;
        state.drafts = data.drafts || [];
        state.discarded = data.discarded || [];
        state.history = data.history || [];
        setConnectionStatus('Base sincronizada');
        setUserInfo(state.user);
        setGlobalStatus('', '');
        renderLoadWarnings(data.warnings || []);
        renderAll();
      })
      .catch((error) => {
        const message = getErrorMessage(error, 'No fue posible leer los datos guardados.');
        setConnectionStatus('Base no conectada');
        setGlobalStatus('No fue posible leer los datos guardados. Detalle: ' + message, 'error');
        renderLoadWarnings(['No fue posible leer los datos guardados: ' + message]);
      });
  }

  function setConnectionStatus(message) {
    const status = document.getElementById('connectionStatus');
    if (status) status.textContent = message;
  }

  function setUserInfo(user) {
    const container = document.getElementById('userEmail');
    if (!container) return;
    if (!user) {
      container.textContent = 'Usuario Google';
      return;
    }
    if (user.identified && user.email) {
      container.textContent = user.email;
      return;
    }
    if (user.effectiveEmail) {
      container.textContent = 'Usuario Google autenticado';
      container.title = 'Apps Script ejecuta con la cuenta propietaria: ' + user.effectiveEmail;
      return;
    }
    container.textContent = user.displayName || 'Usuario Google autenticado';
  }

  function setGlobalStatus(message, tone) {
    const status = document.getElementById('globalLoadStatus');
    if (!status) return;
    status.textContent = message || '';
    status.className = 'load-status ' + (tone || '');
    status.hidden = !message;
  }

  function renderAll() {
    renderCategorySelect();
    renderAdminLists();
    renderTemplateStructure();
    renderDraftTechnicalFields();
    renderDraftLists();
    renderHistory();
  }

  function renderLoadWarnings(warnings) {
    const message = warnings && warnings.length ? warnings.join(' ') : '';
    document.querySelectorAll('.load-warning').forEach((item) => {
      item.remove();
    });
    if (!message) return;
    document.querySelectorAll('.config-page').forEach((page) => {
      const warning = document.createElement('div');
      warning.className = 'empty-state load-warning';
      warning.textContent = message;
      page.prepend(warning);
    });
  }

  function renderCategorySelect() {
    fillSelect('categorySelect', state.lookup.categorias, 'Selecciona categoría');
    renderBottleSelect();
  }

  function renderBottleSelect() {
    const categoryId = document.getElementById('categorySelect').value;
    const bottleIds = state.lookup.relaciones
      .filter((relation) => relation.categoriaId === categoryId)
      .map((relation) => relation.botellaId);
    const bottles = state.lookup.botellas.filter((bottle) => bottleIds.includes(bottle.id));
    fillSelect('bottleSelect', bottles, 'Selecciona botella');
    renderArticleSelect();
  }

  function renderArticleSelect() {
    const categoryId = document.getElementById('categorySelect').value;
    const bottleId = document.getElementById('bottleSelect').value;
    const articles = state.lookup.articulos.filter((article) => article.categoriaId === categoryId && article.botellaId === bottleId);
    const select = document.getElementById('articleSelect');
    select.innerHTML = '<option value="">Selecciona artículo</option>';
    articles.forEach((article) => {
      const option = document.createElement('option');
      option.value = article.id;
      option.textContent = article.codigoArticulo + ' - ' + article.descripcion;
      select.appendChild(option);
    });
    renderArticleDetail();
  }

  function renderArticleDetail() {
    const articleId = document.getElementById('articleSelect').value;
    const article = state.lookup.articulos.find((item) => item.id === articleId);
    const detail = document.getElementById('articleDetail');
    const images = document.getElementById('imageSummary');
    document.getElementById('pdfButton').disabled = !article;
    if (!article) {
      detail.className = 'empty-state';
      detail.textContent = 'Selecciona un artículo activo para ver la ficha.';
      images.className = 'empty-state';
      images.textContent = 'Selecciona un artículo activo para ver sus códigos ETQ y CET.';
      return;
    }
    detail.className = '';
    detail.innerHTML = '';
    [
      ['Código', article.codigoArticulo],
      ['Descripción', article.descripcion],
      ['Estado', article.estado],
      ['Creado por', article.creadoPor],
      ['Última modificación', article.fechaModificacion]
    ].forEach(([label, value]) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.textContent = label + ': ' + (value || '');
      detail.appendChild(item);
    });
    images.className = '';
    images.innerHTML = '';
    const etq = document.createElement('div');
    etq.className = 'list-item';
    etq.textContent = article.etqAplica === true || article.etqAplica === 'TRUE' ? 'ETQ: ' + article.codigoEtq : 'ETQ: No aplica';
    const cet = document.createElement('div');
    cet.className = 'list-item';
    cet.textContent = article.cetAplica === true || article.cetAplica === 'TRUE' ? 'CET: ' + article.codigoCet : 'CET: No aplica';
    images.append(etq, cet);
  }

  function fillSelect(id, rows, emptyText) {
    const select = document.getElementById(id);
    select.innerHTML = '';
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = emptyText;
    select.appendChild(empty);
    rows.forEach((row) => {
      const option = document.createElement('option');
      option.value = row.id;
      option.textContent = row.nombre;
      select.appendChild(option);
    });
    fillDraftSelects();
  }

  function fillDraftSelects() {
    fillPlainSelect('draftCategory', state.admin.categorias || [], 'Selecciona categoría');
    fillPlainSelect('draftBottle', state.admin.botellas || [], 'Selecciona botella');
  }

  function fillPlainSelect(id, rows, emptyText) {
    const select = document.getElementById(id);
    if (!select) return;
    const current = select.value;
    select.innerHTML = '<option value="">' + emptyText + '</option>';
    rows.forEach((row) => {
      const option = document.createElement('option');
      option.value = row.id;
      option.textContent = row.nombre;
      select.appendChild(option);
    });
    select.value = current;
  }

  function renderTemplateStructure() {
    const container = document.getElementById('templateStructure');
    if (!container) return;
    const sections = state.admin.secciones || [];
    const fields = state.admin.campos || [];
    const units = state.admin.unidades || [];
    fillPlainSelect('fieldSection', sections, 'Selecciona sección');
    fillPlainSelect('fieldUnit', units, 'Sin unidad');
    container.innerHTML = '';
    if (!sections.length) {
      container.innerHTML = '<div class="empty-state">No hay secciones configuradas.</div>';
      return;
    }
    sections.forEach((section) => {
      const sectionFields = fields
        .filter((field) => field.seccionId === section.id)
        .sort((a, b) => Number(a.orden || 0) - Number(b.orden || 0));
      const block = document.createElement('section');
      block.className = 'template-section';
      const title = document.createElement('h4');
      title.textContent = section.nombre;
      const grid = document.createElement('div');
      grid.className = 'field-grid';
      if (!sectionFields.length) {
        grid.innerHTML = '<div class="empty-state">Sección sin campos.</div>';
      }
      sectionFields.forEach((field) => {
        const unit = units.find((item) => item.id === field.unidadId);
        const meta = [field.tipo];
        if (unit) meta.push(unit.nombre);
        if (field.obligatorio === true || field.obligatorio === 'TRUE') meta.push('Obligatorio');
        const card = document.createElement('div');
        card.className = 'field-card';
        card.innerHTML = '<strong>' + field.nombre + '</strong><span>' + meta.join(' · ') + '</span>';
        grid.appendChild(card);
      });
      block.append(title, grid);
      container.appendChild(block);
    });
  }

  function renderDraftTechnicalFields() {
    const container = document.getElementById('draftTechnicalFields');
    if (!container) return;
    const sections = state.admin.secciones || [];
    const fields = state.admin.campos || [];
    const units = state.admin.unidades || [];
    container.innerHTML = '';
    if (!sections.length || !fields.length) {
      container.innerHTML = '<div class="empty-state">No hay estructura técnica cargada.</div>';
      return;
    }
    sections.forEach((section) => {
      const sectionFields = fields
        .filter((field) => field.seccionId === section.id)
        .sort((a, b) => Number(a.orden || 0) - Number(b.orden || 0));
      if (!sectionFields.length) return;
      const block = document.createElement('section');
      block.className = 'draft-section';
      const title = document.createElement('h4');
      title.textContent = section.nombre;
      const grid = document.createElement('div');
      grid.className = 'draft-field-grid';
      sectionFields.forEach((field) => {
        const unit = units.find((item) => item.id === field.unidadId);
        const label = document.createElement('label');
        label.textContent = field.nombre + (unit ? ' (' + unit.nombre + ')' : '');
        const input = document.createElement('input');
        input.className = 'draft-field';
        input.dataset.fieldId = field.id;
        input.dataset.fieldName = field.nombre;
        input.type = field.tipo === 'NUMERO' ? 'number' : 'text';
        input.required = field.obligatorio === true || field.obligatorio === 'TRUE';
        if (field.tipo === 'NUMERO') input.step = 'any';
        label.appendChild(input);
        grid.appendChild(label);
      });
      block.append(title, grid);
      container.appendChild(block);
    });
  }

  function bindCatalogModal() {
    document.querySelectorAll('.catalog-action').forEach((button) => {
      button.addEventListener('click', () => openCatalogModal(button.dataset.catalog));
    });
    document.querySelectorAll('[data-close-modal]').forEach((item) => {
      item.addEventListener('click', closeCatalogModal);
    });
    const search = document.getElementById('catalogSearch');
    if (search) search.addEventListener('input', renderCatalogModalList);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeCatalogModal();
    });
  }

  function openCatalogModal(type) {
    const config = CATALOG_CONFIG[type];
    const modal = document.getElementById('catalogModal');
    if (!config || !modal) return;
    catalogModalState.active = type;
    document.getElementById('catalogModalEyebrow').textContent = config.eyebrow;
    document.getElementById('catalogModalTitle').textContent = config.title;
    document.querySelectorAll('.catalog-form').forEach((form) => {
      form.hidden = form.getAttribute('id') !== config.formId;
    });
    if (type === 'category') resetCategoryForm();
    if (type === 'section') cancelSectionEdit();
    const search = document.getElementById('catalogSearch');
    if (search) search.value = '';
    modal.hidden = false;
    document.body.classList.add('modal-open');
    renderCatalogModalList();
    const firstInput = document.querySelector('#' + config.formId + ' input');
    if (firstInput) window.setTimeout(() => firstInput.focus(), 60);
  }

  function closeCatalogModal() {
    const modal = document.getElementById('catalogModal');
    if (!modal || modal.hidden) return;
    modal.hidden = true;
    catalogModalState.active = '';
    document.body.classList.remove('modal-open');
  }

  function renderCatalogModalList() {
    const config = CATALOG_CONFIG[catalogModalState.active];
    const container = document.getElementById('catalogModalList');
    if (!config || !container) return;
    const search = document.getElementById('catalogSearch');
    const query = normalizeClientText(search ? search.value : '');
    const rows = (state.admin[config.rowsKey] || [])
      .slice()
      .sort((a, b) => String(a.nombre || '').localeCompare(String(b.nombre || ''), 'es'));
    const filtered = rows.filter((row) => normalizeClientText(row.nombre).includes(query));
    container.innerHTML = '';
    const summary = document.createElement('div');
    summary.className = 'catalog-list-summary';
    summary.textContent = filtered.length + ' de ' + rows.length + ' registros';
    container.appendChild(summary);
    if (!filtered.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = query ? 'No hay coincidencias.' : config.emptyText;
      container.appendChild(empty);
      return;
    }
    filtered.forEach((row) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      const label = document.createElement('span');
      label.textContent = row.nombre + (row.orden ? ' · Orden ' + row.orden : '');
      item.appendChild(label);
      if (catalogModalState.active === 'section') {
        const editButton = document.createElement('button');
        editButton.className = 'inline-action';
        editButton.type = 'button';
        editButton.textContent = 'Editar';
        editButton.addEventListener('click', () => startSectionEdit(row));
        item.appendChild(editButton);
      }
      container.appendChild(item);
    });
  }

  function normalizeClientText(value) {
    return String(value || '')
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }
  function renderAdminLists() {
    renderCatalogModalList();
  }

  function renderList(id, rows) {
    const container = document.getElementById(id);
    if (!container) return;
    container.innerHTML = '';
    if (!rows.length) {
      container.innerHTML = '<div class="empty-state">Sin registros.</div>';
      return;
    }
    rows.forEach((row) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.textContent = row.nombre;
      container.appendChild(item);
    });
  }

  function renderDraftLists() {
    renderList('draftList', state.drafts.map((draft) => ({ nombre: draft.codigoArticulo + ' - ' + draft.descripcion })));
    renderList('discardedList', state.discarded.map((draft) => ({ nombre: draft.borradorId + ' - ' + draft.motivo })));
  }

  function renderHistory() {
    const container = document.getElementById('historyList');
    container.innerHTML = '';
    if (!state.history.length) {
      container.innerHTML = '<div class="empty-state">Sin historial registrado.</div>';
      return;
    }
    state.history.forEach((event) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.textContent = event.fecha + ' | ' + event.usuario + ' | ' + event.tipoAccion + ' | ' + event.motivo;
      container.appendChild(item);
    });
  }

  function toUpperClientText(value) {
    return String(value || '').trim().replace(/\s+/g, ' ').toUpperCase();
  }
  function submitCatalog(functionName) {
    return function(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = Object.fromEntries(new FormData(form).entries());
      payload.nombre = toUpperClientText(payload.nombre);
      if (form.nombre) form.nombre.value = payload.nombre;
      callServer(functionName, payload)
        .then(() => {
          form.reset();
          if (form.getAttribute('id') === 'categoryForm') resetCategoryForm();
          showToast('Registro creado.');
          loadInitialData();
        })
        .catch((error) => showToast(getErrorMessage(error, 'No fue posible crear el registro.')));
    };
  }

  function resetCategoryForm() {
    const form = document.getElementById('categoryForm');
    if (!form || !form.nombre) return;
    form.nombre.value = 'CAT-';
  }

  function submitSection(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.nombre = toUpperClientText(payload.nombre);
    if (form.nombre) form.nombre.value = payload.nombre;
    const functionName = payload.id ? 'apiUpdateSection' : 'apiCreateSection';
    callServer(functionName, payload)
      .then(() => {
        form.reset();
        cancelSectionEdit(false);
        showToast(payload.id ? 'Sección actualizada.' : 'Sección creada.');
        loadInitialData();
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible guardar la sección.')));
  }

  function startSectionEdit(section) {
    const form = document.getElementById('sectionForm');
    if (!form || !section) return;
    catalogModalState.editingSectionId = section.id;
    form.elements.id.value = section.id || '';
    form.nombre.value = section.nombre || '';
    form.orden.value = section.orden || '';
    document.getElementById('sectionSubmitButton').textContent = 'Guardar cambios';
    document.getElementById('sectionCancelEdit').hidden = false;
    form.nombre.focus();
  }

  function cancelSectionEdit(resetForm) {
    const form = document.getElementById('sectionForm');
    if (!form) return;
    catalogModalState.editingSectionId = '';
    if (resetForm !== false) form.reset();
    form.elements.id.value = '';
    document.getElementById('sectionSubmitButton').textContent = 'Agregar sección';
    document.getElementById('sectionCancelEdit').hidden = true;
  }

  function submitField(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.nombre = toUpperClientText(payload.nombre);
    if (form.nombre) form.nombre.value = payload.nombre;
    payload.obligatorio = form.obligatorio.checked;
    callServer('apiCreateField', payload)
      .then(() => {
        form.reset();
        showToast('Campo creado.');
        loadInitialData();
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible crear el campo.')));
  }
  function saveDraft(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const payload = Object.fromEntries(new FormData(form).entries());
    ['codigoArticulo', 'descripcion', 'codigoEtq', 'codigoCet'].forEach((key) => {
      payload[key] = toUpperClientText(payload[key]);
      if (form[key]) form[key].value = payload[key];
    });
    payload.etqAplica = form.etqAplica.checked;
    payload.cetAplica = form.cetAplica.checked;
    payload.etapa = 'FICHA_TECNICA';
    payload.payload = {
      valores: Array.from(document.querySelectorAll('.draft-field')).map((input) => ({
        campoId: input.dataset.fieldId,
        campo: input.dataset.fieldName,
        valor: toUpperClientText(input.value)
      }))
    };
    callServer('apiSaveDraft', payload)
      .then(() => {
        form.reset();
        showToast('Borrador guardado.');
        loadInitialData();
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible guardar el producto.')));
  }
  function validateImageInput(event) {
    const file = event.target.files[0];
    if (!file) return;
    const imageType = event.target.dataset.imageType || 'imagen';
    if (file.type !== 'image/png') {
      event.target.value = '';
      showToast('Solo se aceptan imágenes PNG para ' + imageType + '.');
      return;
    }
    if (file.size > 1024 * 1024) {
      event.target.value = '';
      showToast('La imagen ' + imageType + ' supera el máximo permitido de 1 MB.');
    }
  }

  function generatePdf() {
    const articuloId = document.getElementById('articleSelect').value;
    callServer('apiGeneratePdf', { articuloId })
      .then((file) => {
        showToast('PDF generado.');
        window.open(file.url, '_blank');
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible generar el PDF.')));
  }

  function createBackup() {
    callServer('apiCreateBackup')
      .then((file) => {
        showToast('Respaldo creado.');
        window.open(file.url, '_blank');
      })
      .catch((error) => showToast(getErrorMessage(error, 'No fue posible crear el respaldo.')));
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    window.setTimeout(() => toast.classList.remove('show'), 4500);
  }
</script>
