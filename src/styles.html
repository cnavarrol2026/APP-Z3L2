<style>
  :root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --ink: #111827;
    --muted: #5b6472;
    --line: #d7dee8;
    --blue: #175cd3;
    --blue-dark: #103f91;
    --green: #7ddc91;
    --green-dark: #1f7a3a;
    --danger: #b42318;
    --focus: rgba(23, 92, 211, 0.22);
    --shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 18px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }

  .brand-lockup {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--green-dark);
    font-size: 0.74rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  h1, h2, h3 {
    margin: 0;
    line-height: 1.2;
  }

  h1 {
    max-width: 760px;
    font-size: clamp(1.2rem, 2.2vw, 1.7rem);
    font-weight: 800;
    color: var(--blue-dark);
    letter-spacing: 0;
  }

  .user-box {
    display: grid;
    gap: 4px;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: right;
  }

  .user-email {
    color: var(--blue-dark);
    font-size: 0.82rem;
    font-weight: 800;
  }

  .main-tabs {
    display: flex;
    gap: 8px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }

  .load-status {
    max-width: 1280px;
    margin: 12px auto 0;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #eef4ff;
    color: var(--blue-dark);
    font-weight: 700;
  }

  .load-status.warning {
    background: #fff7e6;
    color: #7a4b00;
  }

  .load-status.error {
    background: #fff0f0;
    color: var(--danger);
  }

  .config-tabs {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    padding: 10px;
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  button {
    min-height: 40px;
    border: 0;
    border-radius: 8px;
    padding: 9px 14px;
    background: var(--blue);
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
  }

  button:hover:not(:disabled) {
    box-shadow: 0 8px 18px rgba(17, 24, 39, 0.12);
    transform: translateY(-1px);
  }

  button:focus-visible,
  input:focus-visible,
  select:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.55;
  }

  input:disabled,
  select:disabled {
    cursor: wait;
    opacity: 0.72;
  }

  button.secondary,
  .tab-button,
  .config-tab {
    background: #e9eef8;
    color: var(--blue-dark);
  }

  .tab-button.active,
  .config-tab.active {
    background: var(--blue);
    color: white;
  }

  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .config-page {
    display: none;
  }

  .config-page.active {
    display: block;
  }

  .selector-panel,
  .admin-grid,
  .wizard-grid {
    display: grid;
    gap: 14px;
  }

  .selector-panel {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    padding: 18px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
  }

  input,
  select {
    width: 100%;
    min-height: 40px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    background: white;
    color: var(--ink);
    font-size: 0.95rem;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  input:focus,
  select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--focus);
  }

  .search-combo-input {
    padding-right: 28px;
    background: white;
  }

  input[type="checkbox"] {
    width: 18px;
    min-height: 18px;
    accent-color: var(--blue);
  }

  .content-grid {
    display: grid;
    grid-template-columns: 330px 1fr;
    gap: 18px;
    margin-top: 18px;
  }

  .visual-panel,
  .detail-panel,
  .admin-card,
  .wide-panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .visual-panel,
  .detail-panel,
  .wide-panel {
    border-color: #cfd8e5;
  }

  .panel-title-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }

  .empty-state {
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 22px;
    color: var(--muted);
    background: #fbfcff;
  }

  .admin-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-bottom: 18px;
  }

  .admin-card {
    display: grid;
    gap: 10px;
    align-content: start;
    min-height: 360px;
  }

  .admin-card-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    min-height: 50px;
  }

  .wide-panel {
    margin-top: 18px;
  }

  .wizard-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .draft-mode-notice {
    display: flex;
    grid-column: 1 / -1;
    justify-content: space-between;
    gap: 14px;
    align-items: center;
    padding: 12px 14px;
    border: 1px solid #b8c7e6;
    border-radius: 8px;
    background: #eef4ff;
    color: var(--blue-dark);
  }

  .draft-mode-notice[hidden] {
    display: none;
  }

  .draft-mode-notice div {
    display: grid;
    gap: 3px;
  }

  .draft-mode-notice span {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
  }

  .help,
  .actions {
    grid-column: 1 / -1;
  }

  .inline-check {
    align-content: end;
    grid-template-columns: auto 1fr;
    align-items: center;
  }

  .inline-check input {
    width: auto;
    min-height: auto;
  }

  .image-choice-grid {
    display: grid;
    grid-column: 1 / -1;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .image-choice {
    display: grid;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f8fafc;
  }

  .toggle-row {
    display: flex;
    min-height: 40px;
    flex-direction: row;
    gap: 10px;
    align-items: center;
    color: var(--ink);
  }

  .toggle-row span {
    font-weight: 800;
  }

  .help {
    margin: 0;
    color: var(--muted);
    line-height: 1.5;
  }

  .list {
    display: grid;
    gap: 8px;
    margin-top: 8px;
    align-content: start;
  }

  .code-search-panel {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto;
    gap: 10px;
    align-items: end;
    margin: 12px 0;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f8fafc;
  }

  .code-search-result {
    display: grid;
    gap: 8px;
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--muted);
    font-weight: 700;
  }

  .code-search-result.found {
    border-color: #b8c7e6;
    background: #eef4ff;
    color: var(--blue-dark);
  }

  .code-search-result.error {
    border-color: #f5c2c0;
    background: #fff0f0;
    color: var(--danger);
  }

  .code-search-item {
    display: grid;
    gap: 3px;
    padding: 8px 10px;
    border-left: 4px solid var(--blue);
    border-radius: 8px;
    background: #fff;
  }

  .code-search-item span,
  .code-search-item small {
    color: var(--muted);
    font-size: 0.84rem;
    font-weight: 700;
  }

  .list-item,
  .history-item {
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfcff;
    line-height: 1.35;
  }

  .draft-card {
    display: grid;
    gap: 5px;
    padding: 12px;
    border: 1px solid var(--line);
    border-left: 4px solid var(--blue);
    border-radius: 8px;
    background: #fbfcff;
  }

  .draft-card strong {
    color: var(--blue-dark);
  }

  .draft-card span {
    color: var(--ink);
  }

  .draft-card small {
    color: var(--muted);
    font-weight: 700;
  }

  .image-status {
    min-height: 22px;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
  }

  .image-status.saved {
    color: var(--green-dark);
  }

  .image-status a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .draft-card-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
  }

  .small-button {
    min-height: 34px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
  }

  .admin-card .empty-state {
    min-height: 98px;
  }

  .template-panel {
    margin-top: 0;
    margin-bottom: 18px;
  }

  .backup-panel {
    display: grid;
    gap: 14px;
    max-width: 560px;
  }

  .template-structure,
  .template-section {
    display: grid;
    gap: 14px;
  }

  .template-section {
    padding-top: 4px;
  }

  .template-section + .template-section {
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }

  .template-section h4 {
    margin: 0;
    color: var(--blue);
    font-size: 1rem;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .field-card {
    display: grid;
    gap: 6px;
    min-height: 78px;
    padding: 12px;
    border-left: 4px solid var(--blue);
    border-radius: 8px;
    background: #f8fafc;
  }

  .field-card strong {
    font-size: 0.95rem;
  }

  .field-card span {
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .featured-bottle-field,
  .featured-bottle-input {
    border: 1px solid #9cc8aa;
    border-left: 4px solid var(--green-dark);
    background: #f1fbf4;
  }

  .featured-bottle-field strong,
  .featured-bottle-input {
    color: #14532d;
  }

  .featured-bottle-input {
    padding: 10px;
    border-radius: 8px;
    font-weight: 900;
  }

  .technical-entry {
    display: grid;
    grid-column: 1 / -1;
    gap: 14px;
    margin-top: 4px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  .draft-technical-fields,
  .draft-section {
    display: grid;
    gap: 14px;
  }

  .draft-section {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfcff;
  }

  .draft-section h4 {
    margin: 0;
    color: var(--blue);
  }

  .draft-field-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .bottle-insumos-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .mechanical-entry-section {
    gap: 18px;
  }

  .mechanical-preview,
  .mechanical-mini-grid {
    display: grid;
    gap: 14px;
  }

  .mechanical-mini-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .mechanical-mini-card {
    display: grid;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f8fafc;
  }

  .bottle-mini-card {
    display: grid;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f8fafc;
  }

  .formatos-fixed-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .antares-mini-card,
  .levas-platos-block {
    display: grid;
    grid-column: 1 / -1;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
  }

  .antares-mini-card {
