<style>
  :root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --ink: #111827;
    --muted: #5b6472;
    --line: #d7dee8;
    --blue: #175cd3;
    --blue-dark: #103f91;
    --green: #7ddc91;
    --green-dark: #1f7a3a;
    --danger: #b42318;
    --shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 18px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--green-dark);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  h1, h2, h3 {
    margin: 0;
    line-height: 1.2;
  }

  h1 {
    font-size: clamp(1.15rem, 3vw, 1.65rem);
    color: var(--blue-dark);
  }

  .user-box {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: right;
  }

  .main-tabs {
    display: flex;
    gap: 8px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }

  .config-tabs {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    padding: 10px;
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  button {
    min-height: 40px;
    border: 0;
    border-radius: 8px;
    padding: 9px 14px;
    background: var(--blue);
    color: white;
    font-weight: 700;
    cursor: pointer;
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.55;
  }

  button.secondary,
  .tab-button,
  .config-tab {
    background: #e9eef8;
    color: var(--blue-dark);
  }

  .tab-button.active,
  .config-tab.active {
    background: var(--blue);
    color: white;
  }

  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .config-page {
    display: none;
  }

  .config-page.active {
    display: block;
  }

  .selector-panel,
  .admin-grid,
  .wizard-grid {
    display: grid;
    gap: 14px;
  }

  .selector-panel {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    padding: 18px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
  }

  input,
  select {
    width: 100%;
    min-height: 40px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    background: white;
    color: var(--ink);
    font-size: 0.95rem;
  }

  input[type="checkbox"] {
    width: 18px;
    min-height: 18px;
    accent-color: var(--blue);
  }

  .content-grid {
    display: grid;
    grid-template-columns: 330px 1fr;
    gap: 18px;
    margin-top: 18px;
  }

  .visual-panel,
  .detail-panel,
  .admin-card,
  .wide-panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .panel-title-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }

  .empty-state {
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 22px;
    color: var(--muted);
    background: #fbfcff;
  }

  .admin-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 18px;
  }

  .admin-card {
    display: grid;
    gap: 10px;
  }

  .wide-panel {
    margin-top: 18px;
  }

  .wizard-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .help,
  .actions {
    grid-column: 1 / -1;
  }

  .inline-check {
    align-content: end;
    grid-template-columns: auto 1fr;
    align-items: center;
  }

  .inline-check input {
    width: auto;
    min-height: auto;
  }

  .image-choice-grid {
    display: grid;
    grid-column: 1 / -1;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .image-choice {
    display: grid;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f8fafc;
  }

  .toggle-row {
    display: flex;
    min-height: 40px;
    flex-direction: row;
    gap: 10px;
    align-items: center;
    color: var(--ink);
  }

  .toggle-row span {
    font-weight: 800;
  }

  .help {
    margin: 0;
    color: var(--muted);
    line-height: 1.5;
  }

  .list {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }

  .list-item,
  .history-item {
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfcff;
  }

  .template-panel {
    margin-top: 0;
    margin-bottom: 18px;
  }

  .backup-panel {
    display: grid;
    gap: 14px;
    max-width: 560px;
  }

  .template-structure,
  .template-section {
    display: grid;
    gap: 14px;
  }

  .template-section {
    padding-top: 4px;
  }

  .template-section + .template-section {
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }

  .template-section h4 {
    margin: 0;
    color: var(--blue);
    font-size: 1rem;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .field-card {
    display: grid;
    gap: 6px;
    min-height: 78px;
    padding: 12px;
    border-left: 4px solid var(--blue);
    border-radius: 8px;
    background: #f8fafc;
  }

  .field-card strong {
    font-size: 0.95rem;
  }

  .field-card span {
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .technical-entry {
    display: grid;
    grid-column: 1 / -1;
    gap: 14px;
    margin-top: 4px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  .draft-technical-fields,
  .draft-section {
    display: grid;
    gap: 14px;
  }

  .draft-section {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfcff;
  }

  .draft-section h4 {
    margin: 0;
    color: var(--blue);
  }

  .draft-field-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .toast {
    position: fixed;
    right: 20px;
    bottom: 20px;
    max-width: min(420px, calc(100vw - 40px));
    padding: 12px 14px;
    border-radius: 8px;
    background: var(--ink);
    color: white;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 980px) {
    .selector-panel,
    .content-grid,
    .admin-grid,
    .wizard-grid,
    .field-grid,
    .image-choice-grid,
    .draft-field-grid {
      grid-template-columns: 1fr;
    }

    .app-header {
      align-items: flex-start;
      flex-direction: column;
    }

    .user-box {
      text-align: left;
    }
  }
</style>
